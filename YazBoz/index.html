<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <title>Okey Yazboz</title>

    <style>
        body {
            margin: 0;
            background: #222;

            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #layout {
            width: 400px;
            height: 850px;

            display: flex;
            flex-direction: column;
        }

        #notepad {
            flex: 1;
            position: relative;
            font-family: "Comic Sans MS", "Segoe Script", "Brush Script MT", cursive;
            background-image:
                repeating-linear-gradient(to bottom,
                    transparent 0px,
                    transparent 39px,
                    rgba(0, 0, 0, 0.5) 40px),
                url("background.jpg");
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead th {
            background: Sienna;
            color: white;
        }

        th,
        td {
            height: 40px;
            text-align: center;
        }

        .selected {
            text-decoration: underline;
        }

        #actions {
            position: absolute;
            inset: 0;
            height: 40px;

            display: flex;
            flex-direction: row;

            opacity: 0;
            pointer-events: none;
            transition: 0.25s ease;
        }

        #actions.open {
            opacity: 1;
            pointer-events: auto;
        }

        #actions button {
            flex: 1;
            height: 100%;
            font-size: 28px;
        }

        #bottomBar {
            height: 50px;

            display: flex;
            justify-content: space-around;
            align-items: center;

            border-top: 1px solid #ccc;
        }

        #bottomBar button {
            background: none;
            border: none;
            font-size: 18px;
        }
    </style>
</head>

<body>

    <div id="layout">

        <div id="notepad">

            <div id="actions">
                <button onclick="doAction('gosterge')">〰️</button>
                <button onclick="doAction('bitti')">✔️</button>
                <button onclick="doAction('okey')">⭕</button>
                <button onclick="doAction('cift')">👥</button>
                <button onclick="doAction('renk')">➰</button>
                <button onclick="doAction('renk')">➿</button>
                <button onclick="closeActions()">❌</button>
            </div>

            <table>
                <thead>
                    <tr>
                        <th width="40px"></th>
                        <th onclick="selectCell(this,0)">Serkan</th>
                        <th onclick="selectCell(this,1)">Deniz</th>
                        <th onclick="selectCell(this,2)">Fırat</th>
                        <th onclick="selectCell(this,3)">Berkay</th>
                    </tr>
                </thead>

                <tbody id="tbody">
                    <tr>
                        <td>0</td>
                        <td>20</td>
                        <td>20</td>
                        <td>20</td>
                        <td>20</td>
                    </tr>
                </tbody>
            </table>

        </div>

        <!-- ALT BAR -->
        <div id="bottomBar">
            <button onclick="location.reload()">🔄</button>
        </div>

    </div>

    <script>

        let selectedPlayer = null;
        let scores = [20, 20, 20, 20];
        let round = 0;

        function openActions() {
            document.getElementById("actions").classList.add("open");
        }

        function closeActions() {
            document.getElementById("actions").classList.remove("open");
        }


        function selectCell(el, index) {
            document.querySelectorAll("th").forEach(th => th.classList.remove("selected"));
            el.classList.add("selected");

            selectedPlayer = index;
            openActions();
        }

        function doAction(type) {
            if (selectedPlayer === null) return;

            let minus = 0;

            if (type === "bitti") minus = 2;
            if (type === "okey") minus = 4;
            if (type === "cift") minus = 6;
            if (type === "renk") minus = 8;
            if (type === "gosterge") minus = 1;

            for (let i = 0; i < 4; i++) {
                if (i !== selectedPlayer) {
                    scores[i] -= minus;
                }
            }

            if (type !== "gosterge") {
                round++;
            }

            addRow();

            closeActions(); // ✔ DOĞRU
        }

        function addRow() {
            let tr = document.createElement("tr");
            let html = `<td>${round}</td>`;

            scores.forEach((s, i) => {
                if (i === selectedPlayer) {
                    html += `<td>---</td>`;
                } else {
                    html += `<td>${s}</td>`;
                }
            });

            tr.innerHTML = html;
            document.getElementById("tbody").appendChild(tr);
        }
    </script>

</body>

</html>

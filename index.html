<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <title>Okey Yazboz</title>

    <link href="https://fonts.googleapis.com/css2?family=Rock+Salt&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;

            display: flex;
            flex-direction: column;

            width: 100dvw;
            height: 100dvh;
        }

        #notepad {
            flex: 1;

            background-image:
                repeating-linear-gradient(to bottom,
                    transparent 0,
                    transparent 99px,
                    black 100px),
                url("background.jpg");
        }

        #notepad::before {
            content: "";
            position: absolute;
            top: 0;
            bottom: 0;
            left: 10%;
            width: 2px;
            background: red;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-family: 'Rock Salt';
            line-height: 98px;
        }

        thead {
            font-size: 36px;
            color: white;
            background: rgba(160, 82, 45, 0.7);

        }

        tbody {
            font-size: 48px;
            text-align: center;
        }

        .selected {
            text-decoration: underline;
        }

        #actions {
            width: 10%;
            display: flex;
            flex-direction: column;

            opacity: 0;
            pointer-events: none;
            transition: 0.25s ease;
        }

        #actions.open {
            opacity: 1;
            pointer-events: auto;
        }

        #actions button {
            font-size: medium;
        }
    </style>
</head>

<body>
    <div id="notepad">
        <table>
            <thead>
                <tr>
                    <th width="10%">2x</th>
                    <th width="20%" onclick="selectCell(this,0)">Serkan</th>
                    <th width="20%" onclick="selectCell(this,1)">Deniz</th>
                    <th width="20%" onclick="selectCell(this,2)">Fırat</th>
                    <th width="20%" onclick="selectCell(this,3)">Berkay</th>
                </tr>
            </thead>
            <tbody id="tbody">
                <tr>
                    <td>0</td>
                    <td>20</td>
                    <td>20</td>
                    <td>20</td>
                    <td>20</td>
                </tr>
            </tbody>
        </table>

        <div id="actions">
            <button onclick="doAction('bitti')" style="font-size: 28px;">✔️</button>
            <button onclick="doAction('gosterge')" style="font-size: 28px;">➖</button>
            <button>OKEY</button>
            <button>ÇİFT</button>
            <button>RENK</button>
            <button>SIRALI</button>
        </div>
    </div>

    <script>

        let selectedPlayer = null;
        let scores = [20, 20, 20, 20];
        let round = 0;

        function openActions() {
            document.getElementById("actions").classList.add("open");
        }

        function closeActions() {
            document.getElementById("actions").classList.remove("open");
        }


        function selectCell(el, index) {
            document.querySelectorAll("th").forEach(th => th.classList.remove("selected"));
            el.classList.add("selected");

            selectedPlayer = index;
            openActions();
        }

        function doAction(type) {
            if (selectedPlayer === null) return;

            let minus = 0;

            if (type === "bitti") minus = 2;
            if (type === "okey") minus = 4;
            if (type === "cift") minus = 6;
            if (type === "renk") minus = 8;
            if (type === "gosterge") minus = 1;

            for (let i = 0; i < 4; i++) {
                if (i !== selectedPlayer) {
                    scores[i] -= minus;
                }
            }

            if (type !== "gosterge") {
                round++;
            }

            addRow();

            closeActions(); // ✔ DOĞRU
        }

        function addRow() {
            let tr = document.createElement("tr");
            let html = `<td>${round}</td>`;

            scores.forEach((s, i) => {
                if (i === selectedPlayer) {
                    html += `<td>---</td>`;
                } else {
                    html += `<td>${s}</td>`;
                }
            });

            tr.innerHTML = html;
            document.getElementById("tbody").appendChild(tr);
        }
    </script>

</body>

</html>

<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <title>Okey Yazboz — İzleyici</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Michroma&family=Rock+Salt&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="shared.css">
</head>

<body>
    <div id="notepad">
        <table>
            <thead>
                <tr>
                    <th onclick="openMenuPanel()">#</th>
                    <th name="playerName" onclick="selectPlayer(this,0)">Serkan</th>
                    <th name="playerName" onclick="selectPlayer(this,1)">Deniz</th>
                    <th name="playerName" onclick="selectPlayer(this,2)">Fırat</th>
                    <th name="playerName" onclick="selectPlayer(this,3)">Berkay</th>
                </tr>
            </thead>
            <tbody id="scoreTable"></tbody>
        </table>
    </div>
    <div id="menuPanel" onclick="this.style.display='none'">
        <table>
            <thead>
                <tr>
                    <th colspan="2">🏆 Puan Durumu</th>
                </tr>
            </thead>
            <tbody>
                <tr class="titleRow">
                    <td id="sessionHeader"></td>
                    <td id="leagueHeader"></td>

                </tr>
                <tr class="dateRow">
                    <td id="sessionDateCell"></td>
                    <td id="leagueDateCell"></td>
                </tr>
                <tr>
                    <td id="sessionStats"></td>
                    <td id="leagueStats"></td>
                </tr>
            </tbody>
        </table>
        <br>
        <table>
            <thead>
                <tr>
                    <th colspan="2">📜 Geçmiş</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td id="gameStatusBar"></td>
                </tr>
                <tr>
                    <td id="historyList"></td>
                </tr>
            </tbody>
        </table>
    </div>

    <script type="module">
        import { db, renderScoreTable, renderGameStatus, renderStatsEngine, openMenuPanel } from "./shared.js";
        import { onValue, ref } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

        let currentGameId = null;
        let gameUnsub = null;

        function attachGame(gameId) {
            if (gameUnsub) gameUnsub();
            gameUnsub = onValue(ref(db, "games/" + gameId), snap => {
                if (!snap.exists()) return;
                const g = snap.val();
                const state = {
                    scores: g.scores || [],
                    rows: g.rows ? Object.values(g.rows) : [],
                    round: g.round || 0,
                    finished: g.finished || false,
                    finalRanking: g.finalRanking || null,
                    gameNumber: g.gameNumber || null
                };
                renderScoreTable(state);
                renderGameStatus(state.gameNumber, state);
            });
        }

        onValue(ref(db, "currentGameId"), snap => {
            const newGameId = snap.exists() ? snap.val() : null;
            if (newGameId === currentGameId) return;
            currentGameId = newGameId;

            if (!currentGameId) {
                if (gameUnsub) gameUnsub();
                gameUnsub = null;
                document.getElementById("scoreTable").innerHTML = `<tr><td colspan="5">oyun bekleniyor...</td></tr>`;
                renderGameStatus(null, { round: 0, finished: false });
                return;
            }
            attachGame(currentGameId);
        });

        onValue(ref(db, "history"), snap => {
            const entries = snap.exists()
                ? Object.values(snap.val()).sort((a, b) => b.ts - a.ts)
                : [];
            document.getElementById("historyList").innerHTML =
                entries.map(e =>
                    `<div>${e.text}</div>`
                ).join("");
        });

        window.openMenuPanel = openMenuPanel;
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <title>Okey Yazboz — İzleyici</title>
    <link href="https://fonts.googleapis.com/css2?family=Rock+Salt&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="shared.css">
</head>

<body>
    <div id="notepad">
        <table>
            <thead>
                <tr>
                    <th onclick="openMenuPanel()">#</th>
                    <th>Serkan</th>
                    <th>Deniz</th>
                    <th>Fırat</th>
                    <th>Berkay</th>
                </tr>
            </thead>
            <tbody id="scoreTable"></tbody>
        </table>
    </div>

    <div id="menuPanel" class="panel" onclick="if(event.target===this)this.style.display='none'">
        <div class="panel-header">📊 Puan & Geçmiş</div>
        <div class="stats-row">
            <div class="stats-col">
                <div class="stats-col-title">Lig</div>
                <div id="leagueStats"></div>
            </div>
            <div class="stats-col">
                <div class="stats-col-title">Bugün</div>
                <div id="todayStats"></div>
            </div>
        </div>
        <div class="history-section">
            <div class="history-section-title">Geçmiş</div>
            <div id="gameStatusBar"></div>
            <div id="historyList"></div>
        </div>
    </div>

    <script type="module">
        import { db, bindRealtimeGame, bindRealtimeHistory, renderScoreTable, renderGameStatus, renderStatsEngine } from "./shared.js";

        bindRealtimeGame(db, (g) => {
            const table = document.getElementById("scoreTable");
            const bar = document.getElementById("gameStatusBar");

            if (!g) {
                table.innerHTML = `<tr><td colspan="5">oyun bekleniyor...</td></tr>`;
                bar.textContent = "";
                return;
            }

            renderScoreTable(g);
            renderGameStatus(g.gameNumber, g);
        });

        bindRealtimeHistory(db, (entries) => {
            document.getElementById("historyList").innerHTML =
                entries.map(e =>
                    `<div class="history-entry"><span style="color:#555">${e.time}</span> : ${e.text}</div>`
                ).join("");
        });

        window.openMenuPanel = async function () {
            document.getElementById("menuPanel").style.display = "flex";
            await renderStatsEngine(db, {
                league: document.getElementById("leagueStats"),
                today: document.getElementById("todayStats")
            });
        };
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <title>Okey Yazboz</title>

    <link href="https://fonts.googleapis.com/css2?family=Rock+Salt&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;

            display: flex;
            flex-direction: column;

            width: 100dvw;
            height: 100dvh;
        }

        #notepad {
            flex: 1;
            overflow-y: auto;
            background-image: url("background.jpg");
        }

        #notepad::before {
            content: "";
            position: absolute;
            top: 0;
            bottom: 0;
            left: 10%;
            width: 2px;
            background: red;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-family: 'Rock Salt';
        }

        thead {
            line-height: 6dvh;
            font-size: 2dvh;
            color: white;
            background: maroon;
        }

        tbody {
            line-height: 5dvh;
            font-size: 3dvh;
            text-align: center;
        }

        .selected {
            color: lime
        }

        #actions {
            opacity: 0;
            pointer-events: none;
            transition: 0.25s ease;
        }

        #actions.open {
            opacity: 1;
            pointer-events: auto;
        }

        #actions button {
            font-size: 3dvh;
            padding: 5px;
            margin: 5px;
        }

        #actions button.active {
            background-color: maroon;
        }
    </style>
</head>

<body>
    <div id="notepad">
        <table>
            <thead>
                <tr>
                    <th width="10%"></th>
                    <th width="20%" onclick="selectCell(this,0)">Serkan</th>
                    <th width="20%" onclick="selectCell(this,1)">Deniz</th>
                    <th width="20%" onclick="selectCell(this,2)">Fırat</th>
                    <th width="20%" onclick="selectCell(this,3)">Berkay</th>
                </tr>
            </thead>
            <tbody id="tbody">
                <tr>
                    <td>0</td>
                    <td>20</td>
                    <td>20</td>
                    <td>20</td>
                    <td>20</td>
                </tr>
            </tbody>
        </table>

        <div id="actions">
            <button onclick="toggle(this)" id="2x">✖️</button>
            <button onclick="minus(1)">➕</button>
            <button onclick="next()" id="type">➖</button>
            <button onclick="minus(types[typeIndex].value)">✔️</button>
            <button onclick="minus(types[typeIndex].value * 2)">⭕️</button>
        </div>
    </div>

    <script>
        let selectedPlayer = null;
        let scores = [20, 20, 20, 20];
        let round = 0;
        let typeIndex = 0;
        let isDouble = false;

        const types = [
            { name: "normal", icon: "➖", value: 2 },
            { name: "cift", icon: "➗", value: 6 },
            { name: "renk", icon: "➰", value: 8 }
        ];

        function selectCell(el, index) {
            document.querySelectorAll("th").forEach(th => th.classList.remove("selected"));
            el.classList.add("selected");
            selectedPlayer = index;
            openActions();
        }

        function openActions() {
            let actions = document.getElementById("actions");

            let old = actions.querySelector("table");
            if (old) old.remove();

            let table = document.createElement("table");
            let tbody = document.createElement("tbody");
            let tr = document.createElement("tr");

            let html = `<td>${round}</td>`;
            scores.forEach(s => {
                html += `<td>${s}</td>`;
            });

            tr.innerHTML = html;
            tbody.appendChild(tr);
            table.appendChild(tbody);

            actions.prepend(table);

            actions.classList.add("open");
        }

        function closeActions() {
            typeIndex = 0;
            document.getElementById("type").innerText = types[typeIndex].icon;

            isDouble = false
            document.getElementById("2x").classList.remove("active")

            document.getElementById("actions").classList.remove("open");
        }

        function toggle(el) {
            isDouble = !isDouble;
            el.classList.toggle("active");
        }

        function next() {
            typeIndex = (typeIndex + 1) % types.length;
            document.getElementById("type").innerText = types[typeIndex].icon;
        }

        function minus(amount) {
            if (selectedPlayer === null) return;

            if (isDouble && amount !== 1) {
                amount *= 2;
            }

            for (let i = 0; i < 4; i++) {
                if (i !== selectedPlayer) {
                    scores[i] -= amount;
                }
            }

            if (amount !== 1) {
                round++;
            }

            addRow();
            closeActions();
        }

        function addRow() {
            let tr = document.createElement("tr");
            let html = `<td>${round}</td>`;

            scores.forEach((s, i) => {
                if (i === selectedPlayer) {
                    html += `<td>---</td>`;
                } else {
                    html += `<td>${s}</td>`;
                }
            });

            tr.innerHTML = html;
            document.getElementById("tbody").appendChild(tr);
        }
    </script>

</body>

</html>

<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <title>Okey Yazboz</title>
    <link href="https://fonts.googleapis.com/css2?family=Rock+Salt&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            background: black;
            display: flex;
            flex-direction: column;
            width: 100dvw;
            height: 100dvh;
            overflow: hidden;
        }

        #notepad {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            background-image: url("background.jpg");
            background-size: cover;
            overflow-y: auto;
        }

        #notepad::before {
            content: "";
            position: absolute;
            top: 0;
            bottom: 0;
            left: 10%;
            width: 2px;
            background: red;
        }

        #notepad>table {
            width: 100%;
            border-collapse: collapse;
            font-family: 'Rock Salt';
            position: relative;
        }

        #notepad>table>thead {
            line-height: 10dvw;
            font-size: 4dvw;
            color: white;
            background: sienna;
        }

        #notepad>table>tbody {
            line-height: 12dvw;
            font-size: 8dvw;
            text-align: center;
        }

        .resultsRow {
            border-top: 1px solid black;
            font-weight: bold;
            color: red;
            vertical-align: top;
        }

        .panel {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .9);
            font-size: 6dvw;
            color: white;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .panel button {
            font-size: 6dvw;
            width: 50dvw;
        }

        #historyList {
            width: 90dvw;
            font-family: monospace;
            font-size: 3dvw;
            max-height: 40dvh;
            overflow-y: auto;
            scrollbar-width: none;
        }
    </style>
</head>

<body>

    <div id="menuPanel" class="panel">

        <table style="width:90dvw">
            <tr>
                <td id="leagueTable"></td>
                <td id="sessionTable"></td>
            </tr>
        </table>
        <p id="historyList"></p> <br>
        <button id="newGameBtn" onclick="createNewGame()">Yeni Oyun</button>
        <button id="sessionBtn" onclick="toggleSession()"></button>
        <button id="undoBtn" onclick="undo()">↩ Geri Al</button>
        <p style="font-size:3dvw">YazBoz 1.0 by F.AKS. 13.05.2026</p>

    </div>

    <div id="notepad">
        <table>
            <thead>
                <tr>
                    <th onclick="openMenu()">#</th>
                    <th name="playerName" onclick="selectPlayer(this,0)">Serkan</th>
                    <th name="playerName" onclick="selectPlayer(this,1)">Deniz</th>
                    <th name="playerName" onclick="selectPlayer(this,2)">Fırat</th>
                    <th name="playerName" onclick="selectPlayer(this,3)">Berkay</th>
                </tr>
            </thead>
            <tbody id="scoreTable"></tbody>
        </table>
    </div>

    <div id="actionsPanel" class="panel">
        <button id="gostergeButton" onclick="applyScore(1)">Gösterge ➕ 1</button>
        <button id="penaltyButton" onclick="applyScore(-2)">Ceza ➖ 2</button>
        <button id="doubleButton" onclick="toggleDouble()">Renk ✖️ 1</button>
        <button id="normalButton" onclick="applyScore(2)">Normal ✔️ 2</button>
        <button id="okeyButton" onclick="applyScore(4)">Okey ⭕️ 4</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getDatabase, ref, get, set, push, onValue, runTransaction } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

        // ── Firebase ────────────────────────────────────────────────────────
        const db = getDatabase(initializeApp({
            apiKey: "AIzaSyDi0ujxXS-pOoKYei3l2wTDdgE107waz2c",
            authDomain: "yazboz-6588f.firebaseapp.com",
            databaseURL: "https://yazboz-6588f-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "yazboz-6588f",
            storageBucket: "yazboz-6588f.firebasestorage.app",
            messagingSenderId: "7696379579",
            appId: "1:7696379579:web:7c5270d6611253af8e039e"
        }));

        // ── Sabitler & durum ────────────────────────────────────────────────
        const PLAYERS = ["Serkan", "Deniz", "Fırat", "Berkay"];
        const START = [20, 20, 20, 20];
        const MEDALS = ["1.", "2.", "3.", "4."];

        let gameId = null;
        let gameNumber = 0;
        let lastFinished = false;
        let finalSnap = null;
        let state = { scores: [...START], activePlayer: null, round: 0, doubleMode: false, finished: false, rows: [] };

        // ── Başlangıç ───────────────────────────────────────────────────────
        init();
        async function init() {
            const snap = await get(ref(db, "currentGameId"));
            if (!snap.exists()) return;
            gameId = snap.val();
            await loadGameNumber();
            listenGame();
            listenHistory();
        }

        async function loadGameNumber() {
            const snap = await get(ref(db, "games/" + gameId + "/gameNumber"));
            if (snap.exists()) gameNumber = snap.val();
        }

        // ── Log yaz ─────────────────────────────────────────────────────────
        async function log(text, type = "info") {
            const now = new Date();
            const time = now.toLocaleString("tr-TR", {
                day: "2-digit", month: "2-digit", year: "2-digit",
                hour: "2-digit", minute: "2-digit"
            }).replace(",", "");
            await push(ref(db, "history"), { text, type, time, ts: now.getTime() });
        }

        // ── Geçmişi dinle ve göster ─────────────────────────────────────────
        function listenHistory() {
            onValue(ref(db, "history"), snap => {
                if (!snap.exists()) { historyList.innerHTML = ""; return; }
                const entries = Object.values(snap.val())
                    .sort((a, b) => b.ts - a.ts);
                historyList.innerHTML = entries.map(e =>
                    `<div class="log-${e.type}">${e.time} : ${e.text}</div>`
                ).join("");
            });
        }

        // ── Oyunu dinle ─────────────────────────────────────────────────────
        function listenGame() {
            onValue(ref(db, "games/" + gameId), snap => {
                if (!snap.exists()) return;
                const g = snap.val();
                if (g.finished) finalSnap = g;
                Object.assign(state, {
                    scores: g.scores || [...START],
                    rows: g.rows || [],
                    round: g.round || 0,
                    finished: g.finished || false,
                    finalRanking: g.finalRanking || null,
                });
                render();
            });
        }

        // ── Menü ────────────────────────────────────────────────────────────
        window.openMenu = async function () {
            menuPanel.style.display = "flex";
            await renderLeague();
            await renderSession();
        };

        document.getElementById("menuPanel").addEventListener("click", e => {
            if (e.target.id === "menuPanel") menuPanel.style.display = "none";
        });

        // ── Lig tablosu ─────────────────────────────────────────────────────
        async function renderLeague() {
            const snap = await get(ref(db, "league"));
            const league = snap.exists() ? snap.val() : {};
            const sorted = Object.entries(league).sort((a, b) => b[1] - a[1]);
            leagueTable.innerHTML =
                `<b>7. Lig</b><br><small style="font-size:4dvw">14.04.2026</small><ol>` +
                sorted.map(([n, p]) => `<li>${n} (${p})</li>`).join("") +
                `</ol>`;
        }

        // ── Oturum tablosu ──────────────────────────────────────────────────
        async function renderSession() {
            const snap = await get(ref(db, "sessionState"));
            if (!snap.exists()) return;
            const s = snap.val();
            const id = s.isOpen ? s.currentSessionId : s.lastClosedSessionId;
            const color = s.isOpen ? "white" : "gray"; // Kapalıysa gri
            if (!id) { sessionTable.innerHTML = ""; return; }

            const sSnap = await get(ref(db, "sessions/" + id));
            if (!sSnap.exists()) return;
            const session = sSnap.val();
            const sorted = Object.entries(session.scores).sort((a, b) => b[1] - a[1]);
            const date = new Date(session.createdAt).toLocaleString("tr-TR");

            sessionTable.innerHTML =
                `<span style="color:${color}">` +
                `<b>${session.sessionNumber}. Oturum</b><br>` +
                `<small style="font-size:4dvw">${date}</small><ol>` +
                sorted.map(([n, p]) => `<li>${n} (${p})</li>`).join("") +
                `</ol></span>`;
        }

        // ── Oyuncu seçimi ───────────────────────────────────────────────────
        window.selectPlayer = function (el, index) {
            if (state.finished) return;
            state.activePlayer = index;
            document.querySelectorAll('[name="playerName"]').forEach(e => e.style.color = "");
            el.style.color = "yellow";
            actionsPanel.style.display = "flex";
        };

        document.getElementById("actionsPanel").addEventListener("click", e => {
            if (e.target.id === "actionsPanel") closeActionsPanel();
        });

        // ── Renk modu ───────────────────────────────────────────────────────
        window.toggleDouble = function () {
            state.doubleMode = !state.doubleMode;
            const x = state.doubleMode;
            doubleButton.innerText = x ? "Renk ❌ 2" : "Renk ✖️ 1";
            penaltyButton.innerText = x ? "Ceza ➖ 4" : "Ceza ➖ 2";
            normalButton.innerText = x ? "Normal ➕ 4" : "Normal ➕ 2";
            okeyButton.innerText = x ? "Okey ⭕️ 8" : "Okey ⭕️ 4";
        };

        // ── Skor uygula ─────────────────────────────────────────────────────
        window.applyScore = async function (rawValue) {
            const double = state.doubleMode && rawValue !== 1;
            const value = double ? rawValue * 2 : rawValue;
            const player = PLAYERS[state.activePlayer];
            const round = state.round + (rawValue !== 1 ? 1 : 0);

            // Log metni
            const renk = double ? "renge" : "";
            let logText, logType;
            if (rawValue === 1) { logText = `${round}. elde ${player} gösterge gösterdi.`; logType = "info"; }
            else if (rawValue < 0) { logText = `${round}. elde ${player} ${renk} ceza aldı.`; logType = "penalty"; }
            else if (rawValue === 2) { logText = `${round}. elde ${player} ${renk} bitti.`; logType = "win"; }
            else if (rawValue === 4) { logText = `${round}. elde ${player} ${renk} bastı.`; logType = "win"; }

            await runTransaction(ref(db, "games/" + gameId), g => {
                if (!g || g.finished) return g;
                const p = state.activePlayer;
                if (p === null) return g;

                if (value < 0) {
                    g.scores[p] += value;
                } else {
                    for (let i = 0; i < 4; i++) if (i !== p) g.scores[i] -= value;
                }

                if (rawValue !== 1) g.round++;
                g.rows = g.rows || [];
                g.rows.push({ round: g.round, scores: [...g.scores], player: p, value });

                const losers = g.scores.filter(s => s <= 0).length;
                if (losers >= 2 && !g.finished) {
                    g.finished = true;
                    g.finalRanking = [...g.scores]
                        .map((s, i) => ({ i, s }))
                        .sort((a, b) => b.s - a.s)
                        .map(r => r.i);
                }
                return g;
            });

            await log(logText, logType);
            closeActionsPanel();
        };

        function closeActionsPanel() {
            document.getElementsByName("playerName").forEach(e => e.style.color = "");
            state.activePlayer = null;
            state.doubleMode = false;
            doubleButton.innerText = "Renk ✖️ 1";
            penaltyButton.innerText = "Ceza ➖ 2";
            normalButton.innerText = "Normal ➕ 2";
            okeyButton.innerText = "Okey ⭕️ 4";
            actionsPanel.style.display = "none";
        }

        // ── Tabloyu çiz ─────────────────────────────────────────────────────
        function render() {
            const src = finalSnap?.scores || state.scores;
            const ranking = state.finalRanking ||
                (state.finished
                    ? [...src].map((s, i) => ({ i, s })).sort((a, b) => b.s - a.s).map(r => r.i)
                    : null);

            scoreTable.innerHTML =
                `<tr><td>0</td>${START.map(s => `<td>${s}</td>`).join("")}</tr>` +
                state.rows.map(r =>
                    `<tr><td>${r.round}</td>` +
                    r.scores.map((s, i) => i === r.player
                        ? `<td style="color:red;font-weight:bold">${r.value > 0 ? "+" : ""}${r.value}</td>`
                        : `<td>${s}</td>`
                    ).join("") + `</tr>`
                ).join("");

            if (state.finished && ranking) {
                const icons = ["🥇", "🥈", "", ""];
                scoreTable.innerHTML += `<tr class="resultsRow"><td></td>` +
                    src.map((s, i) => {
                        const rank = ranking.indexOf(i);
                        return `<td>${s}${icons[rank] ? "<br>" + icons[rank] : ""}</td>`;
                    }).join("") + `</tr>`;
            }

            // Oyun yeni bittiyse puanları güncelle ve log yaz
            if (state.finished && !lastFinished) {
                lastFinished = true;
                updateScores();
            }
            if (!state.finished) { lastFinished = false; finalSnap = null; }

            newGameBtn.disabled = !state.finished;
        }

        // ── Puan güncelleme ─────────────────────────────────────────────────
        async function updateScores() {
            const snap = await get(ref(db, "games/" + gameId));
            if (!snap.exists() || snap.val().scoresUpdated) return;

            const ranking = state.finalRanking ||
                [...state.scores].map((s, i) => ({ i, s })).sort((a, b) => b.s - a.s).map(r => r.i);
            const [first, second] = ranking;

            // Oyun bitiş logu
            const resultText = ranking.map((pi, rank) =>
                `${MEDALS[rank]} ${PLAYERS[pi]}`).join(", ");
            await log(`${gameNumber}. oyun bitti — ${resultText}`, "game");

            const sState = await get(ref(db, "sessionState"));
            if (!sState.exists()) return;
            const ss = sState.val();
            if (!ss.isOpen || !ss.currentSessionId) return;

            // Oturum puanları
            const refS = ref(db, "sessions/" + ss.currentSessionId + "/scores");
            const sSnap = await get(refS);
            if (sSnap.exists()) {
                const d = sSnap.val();
                d[PLAYERS[first]] = (d[PLAYERS[first]] || 0) + 3;
                d[PLAYERS[second]] = (d[PLAYERS[second]] || 0) + 1;
                await set(refS, d);
            }

            // Lig puanları
            const refL = ref(db, "league");
            const lSnap = await get(refL);
            const league = lSnap.exists() ? lSnap.val() : {};
            PLAYERS.forEach(p => league[p] = league[p] || 0);
            league[PLAYERS[first]] += 3;
            league[PLAYERS[second]] += 1;
            await set(refL, league);

            await set(ref(db, "games/" + gameId + "/scoresUpdated"), true);
        }

        // ── Yeni oyun ───────────────────────────────────────────────────────
        window.createNewGame = async function () {
            const sState = await get(ref(db, "sessionState"));
            const ss = sState.exists() ? sState.val() : { isOpen: false };

            let count;
            if (ss.isOpen) {
                // Oturum içindeki oyun sayacı
                const snap = await get(ref(db, "sessions/" + ss.currentSessionId + "/gameCount"));
                count = snap.exists() ? snap.val() + 1 : 1;
                await set(ref(db, "sessions/" + ss.currentSessionId + "/gameCount"), count);
            } else {
                count = 0; // Oturum dışı oyunlar numarasız
            }
            gameNumber = count;

            const newRef = push(ref(db, "games"));
            await set(newRef, { scores: [...START], round: 0, finished: false, rows: [], gameNumber: count });
            await set(ref(db, "currentGameId"), newRef.key);

            gameId = newRef.key;
            Object.assign(state, { scores: [...START], rows: [], round: 0, finished: false });

            await log(`${count}. oyun başladı`, "game"); // Başlangıç logu
            listenGame();
            render();
        };

        // ── Oturum aç/kapat ─────────────────────────────────────────────────
        window.toggleSession = async function () {
            const refState = ref(db, "sessionState");
            const snap = await get(refState);
            let s = snap.exists() ? snap.val() : { isOpen: false };

            if (!s.isOpen) {
                const newRef = push(ref(db, "sessions"));
                s.sessionNumber = (s.sessionNumber || 0) + 1;
                await set(newRef, {
                    createdAt: Date.now(),
                    sessionNumber: s.sessionNumber,
                    scores: { Serkan: 0, Deniz: 0, Fırat: 0, Berkay: 0 }
                });
                Object.assign(s, { isOpen: true, currentSessionId: newRef.key });
                await log(`${s.sessionNumber}. oturum açıldı`, "session"); // Oturum açılış logu
            } else {
                await log(`${s.sessionNumber}. oturum kapatıldı`, "session"); // Oturum kapanış logu
                s.lastClosedSessionId = s.currentSessionId;
                Object.assign(s, { isOpen: false, currentSessionId: null, startedAt: null });
            }

            await set(refState, s);
            await renderLeague();
            await renderSession();
        };

        onValue(ref(db, "sessionState"), snap => {
            if (!snap.exists()) return;
            const s = snap.val();
            sessionBtn.innerText = s.isOpen ? "Oturumu Sonlandır" : "Yeni Oturum";
        });

        // ── Geri al ─────────────────────────────────────────────────────────
        window.undo = async function () {
            if (state.rows.length === 0) return;

            const wasFinished = state.finished;
            const prevRanking = state.finalRanking;

            state.rows.pop();
            state.scores = [...START];
            state.round = 0;
            state.rows.forEach(r => {
                if (r.value < 0) {
                    state.scores[r.player] += r.value;
                } else {
                    for (let i = 0; i < 4; i++) if (i !== r.player) state.scores[i] -= r.value;
                }
                if (r.value !== 1) state.round++;
            });

            await log(`${gameNumber}. oyun — son hamle geri alındı`, "info"); // Geri al logu

            if (wasFinished && prevRanking) {
                Object.assign(state, { finished: false, finalRanking: null, scoresUpdated: false });

                const refL = ref(db, "league");
                const lSnap = await get(refL);
                if (lSnap.exists()) {
                    const league = lSnap.val();
                    league[PLAYERS[prevRanking[0]]] -= 3;
                    league[PLAYERS[prevRanking[1]]] -= 1;
                    await set(refL, league);
                }

                const sState = await get(ref(db, "sessionState"));
                if (sState.exists()) {
                    const ss = sState.val();
                    if (ss.isOpen && ss.currentSessionId) {
                        const refS = ref(db, "sessions/" + ss.currentSessionId + "/scores");
                        const sSnap = await get(refS);
                        if (sSnap.exists()) {
                            const d = sSnap.val();
                            d[PLAYERS[prevRanking[0]]] -= 3;
                            d[PLAYERS[prevRanking[1]]] -= 1;
                            await set(refS, d);
                        }
                    }
                }

                await set(ref(db, "games/" + gameId), state);
                menuPanel.style.display = "none";
            }
        };
    </script>
</body>

</html>

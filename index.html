<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <title>Okey Yazboz</title>

    <link href="https://fonts.googleapis.com/css2?family=Rock+Salt&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            background: black;
            display: flex;
            flex-direction: column;
            width: 100dvw;
            height: 100dvh;
            overflow: hidden;
        }

        #notepad {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            background-image: url("background.jpg");
            background-size: cover;
            overflow-y: auto;
        }

        #notepad::before {
            content: "";
            position: absolute;
            top: 0;
            bottom: 0;
            left: 10%;
            width: 2px;
            background: red;
        }

        #notepad>table {
            width: 100%;
            border-collapse: collapse;
            font-family: 'Rock Salt';
            position: relative;
        }

        #notepad>table>thead {
            line-height: 60px;
            font-size: 30px;
            color: white;
            background: sienna;
        }

        #notepad>table>tbody {
            line-height: 80px;
            font-size: 50px;
            text-align: center;
        }

        .resultsRow {
            border-top: 1px solid black;
            font-weight: bold;
            color: red;
        }

        .panel {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .9);
            color:white;
            font-size: xxx-large;

            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;

            z-index: 999999;
        }

        .panel button {
            font-size: 7dvh;
        }

        #menuBar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;

            display: flex;
            justify-content: flex-end;
        }

        #menuBar>button {
            font-size: 5dvh;
            border: none;
            background: transparent;
        }
    </style>
</head>

<body>
    <div id="notepad">
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th class="playerName" onclick="selectPlayer(this,0)">Serkan</th>
                    <th class="playerName" onclick="selectPlayer(this,1)">Deniz</th>
                    <th class="playerName" onclick="selectPlayer(this,2)">Fırat</th>
                    <th class="playerName" onclick="selectPlayer(this,3)">Berkay</th>
                </tr>
            </thead>
            <tbody id="scoreTable"></tbody>
        </table>
    </div>

    <div id="actionsPanel" class="panel">
        <table style="text-align: center;">
            <tr style="font-size: 2dvh;">
                <td>Gösterge</td>
                <td>Ceza</td>
                <td>Renk</td>
                <td>Normal</td>
                <td>Okey</td>
            </tr>
            <tr>
                <td><button onclick="applyScore(1)">➕</button></td>
                <td><button onclick="applyPenalty()">➖</button></td>
                <td><button onclick="toggleDoubleMode(this)" id="doubleButton">✖️</button></td>
                <td><button onclick="applyNormal()">✔️</button></td>
                <td><button onclick="applyOkey()">⭕️</button></td>
            </tr>
            <tr>
                <td>+1</td>
                <td id="penaltyValue">-2</td>
                <td id="doubleValue">x1</td>
                <td id="normalValue">+2</td>
                <td id="okeyValue">+4</td>
            </tr>
        </table>

    </div>

    <div id="leaguePanel" class="panel">
        <b>7. Lig Puan Durumu</b>
        <div id="leagueTable"></div>
    </div>

    <div id="sessionPanel" class="panel">
        <b>Oturum Puan Durumu</b>
        <div id="sessionTable"></div>
    </div>

    <div id="menuBar">
        <button id="newGameBtn" onclick="createNewGame()">🆕</button>
        <button id="sessionBtn" onclick="toggleSession()">⏺️</button>
        <button onclick="showSession()">🏆</button>
        <button onclick="openLeague()">📊</button>
        <button onclick="undo()">↩️</button>
    </div>

    <script type="module">

        // =========================================================
        // FIREBASE IMPORTS
        // =========================================================

        import { initializeApp }
            from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

        import { getDatabase, ref, get, set, push, onValue }
            from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

        // =========================================================
        // FIREBASE CONFIG
        // =========================================================

        const firebaseConfig = {
            apiKey: "AIzaSyDi0ujxXS-pOoKYei3l2wTDdgE107waz2c",
            authDomain: "yazboz-6588f.firebaseapp.com",
            databaseURL: "https://yazboz-6588f-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "yazboz-6588f",
            storageBucket: "yazboz-6588f.firebasestorage.app",
            messagingSenderId: "7696379579",
            appId: "1:7696379579:web:7c5270d6611253af8e039e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // =========================================================
        // GLOBAL VARIABLES
        // =========================================================

        const playerNames = ["Serkan", "Deniz", "Fırat", "Berkay"];

        let currentGameId = null;
        let currentSessionId = null;
        let sessionOpen = false;

        // =========================================================
        // GAME STATE
        // =========================================================

        const gameState = {
            scores: [20, 20, 20, 20],
            activePlayer: null,
            round: 0,
            baseScore: 2,
            doubleMode: false,
            finished: false,
            rows: []
        };

        // =========================================================
        // INITIAL STARTUP
        // =========================================================

        loadCurrentGame();

        // =========================================================
        // REALTIME LISTENERS
        // =========================================================

        onValue(ref(db, "sessionState"), snap => {
            if (!snap.exists()) return;
            sessionOpen = snap.val().isOpen;
            currentSessionId = snap.val().currentSessionId;
            document.getElementById("sessionBtn").innerText = sessionOpen ? "⏹️" : "⏺️";
        });

        // =========================================================
        // LOAD CURRENT GAME
        // =========================================================

        async function loadCurrentGame() {
            const currentRef = ref(db, "currentGameId");
            const currentSnap = await get(currentRef);
            if (!currentSnap.exists()) {
                createNewGame();
                return;
            }
            currentGameId = currentSnap.val();
            listenGame();
        }

        // =========================================================
        // LISTEN ACTIVE GAME
        // =========================================================

        function listenGame() {
            const gameRef = ref(db, "games/" + currentGameId);
            onValue(gameRef, snap => {
                if (!snap.exists()) return;
                Object.assign(gameState, snap.val());
                rebuildTable();
            });
        }

        // =========================================================
        // SAVE GAME
        // =========================================================

        async function saveGame() {
            gameState.status = gameState.finished ? "finished" : "active";
            await set(ref(db, "games/" + currentGameId), gameState);
        }

        // =========================================================
        // CREATE NEW GAME
        // =========================================================

        window.createNewGame = async function () {
            if (!gameState.finished) return;
            const newGameRef = push(ref(db, "games"));
            const newGameId = newGameRef.key;
            const currentSnap = await get(ref(db, "currentGameId"));
            if (currentSnap.exists()) {
                await set(
                    ref(
                        db,
                        "games/" + currentSnap.val() + "/status"
                    ),
                    "finished"
                );
            }
            const newGame = {
                status: "active",
                createdAt: Date.now(),
                scores: [20, 20, 20, 20],
                activePlayer: null,
                round: 0,
                baseScore: 2,
                doubleMode: false,
                finished: false,
                rows: []
            };
            await set(ref(db, "games/" + newGameId), newGame);
            await set(ref(db, "currentGameId"), newGameId);
            currentGameId = newGameId;
            Object.assign(gameState, newGame);
            rebuildTable();
            listenGame();
        }

        // =========================================================
        // PLAYER SELECT
        // =========================================================

        window.selectPlayer = function (el, index) {
            if (gameState.finished) return;
            gameState.activePlayer = index;
            document.querySelectorAll(".playerName").forEach(e => e.style.color = "");
            el.style.color = "yellow";
            document.getElementById("actionsPanel").style.display = "flex";
        }

        // =========================================================
        // DOUBLE MODE
        // =========================================================

        window.toggleDoubleMode = function (btn) {
            gameState.doubleMode = !gameState.doubleMode;
            gameState.baseScore = gameState.doubleMode ? 4 : 2;
            btn.innerText = gameState.doubleMode ? "❌" : "✖️";
            document.getElementById("penaltyValue").innerText = gameState.doubleMode ? "-4" : "-2";
            document.getElementById("doubleValue").innerText = gameState.doubleMode ? "x2" : "x1";
            document.getElementById("normalValue").innerText = gameState.doubleMode ? "+4" : "+2";
            document.getElementById("okeyValue").innerText = gameState.doubleMode ? "+8" : "+4";
        }

        // =========================================================
        // SCORE ACTIONS
        // =========================================================

        window.applyPenalty = function () { applyScore(-gameState.baseScore); }
        window.applyNormal = function () { applyScore(gameState.baseScore); }
        window.applyOkey = function () { applyScore(gameState.baseScore * 2); }

        // =========================================================
        // APPLY SCORE
        // =========================================================

        window.applyScore = async function (value) {
            if (gameState.finished) return;
            const player = gameState.activePlayer;
            if (player === null) return;
            if (value < 0) {
                gameState.scores[player] += value;
            } else {
                for (let i = 0; i < 4; i++) {
                    if (i !== player) {
                        gameState.scores[i] -= value;
                    }
                }
            }
            if (value !== 1) gameState.round++;
            gameState.rows.push({
                round: gameState.round,
                scores: [...gameState.scores],
                player,
                value
            });
            await checkGameOver();
            await saveGame();
            closePanel();
        }

        // =========================================================
        // GAME OVER CHECK
        // =========================================================

        async function checkGameOver() {
            const losers = gameState.scores.filter(s => s <= 0).length;
            if (losers < 2) return;
            if (gameState.finished) return;
            gameState.finished = true;
            const sorted = [...gameState.scores]
                .map((s, i) => ({ s, i }))
                .sort((a, b) => b.s - a.s);
            gameState.finalRanking = [sorted[0].i, sorted[1].i];
            await set(ref(db, "games/" + currentGameId + "/finished"), true);
            await set(ref(db, "games/" + currentGameId + "/status"), "finished");
            if (sessionOpen) {
                await updateLeague();
                await updateSession();
            }
            closePanel();
            rebuildTable();
        }

        // =========================================================
        // PANEL CLOSE
        // =========================================================

        function closePanel() {
            gameState.activePlayer = null;
            gameState.doubleMode = false;
            gameState.baseScore = 2;
            document.querySelectorAll(".playerName").forEach(e => e.style.color = "");
            document.getElementById("doubleButton").innerText = "✖️";
            document.getElementById("penaltyValue").innerText = "-2";
            document.getElementById("doubleValue").innerText = "x1";
            document.getElementById("normalValue").innerText = "+2";
            document.getElementById("okeyValue").innerText = "+4";
            document.getElementById("actionsPanel").style.display = "none";
        }

        // =========================================================
        // SESSION
        // =========================================================
        async function updateSession() {
            if (!sessionOpen || !currentSessionId) return;

            const refS = ref(db, "sessions/" + currentSessionId + "/scores");
            const snap = await get(refS);

            if (!snap.exists()) return;
            const data = snap.val();
            const sorted = gameState.scores
                .map((s, i) => ({ name: playerNames[i], s }))
                .sort((a, b) => b.s - a.s);
            data[sorted[0].name] = (data[sorted[0].name] || 0) + 3;
            data[sorted[1].name] = (data[sorted[1].name] || 0) + 1;
            await set(refS, data);
        }

        window.toggleSession = async function () {
            const refState = ref(db, "sessionState");
            const snap = await get(refState);

            let state = snap.exists()
                ? snap.val()
                : { isOpen: false, currentSessionId: null };

            if (!state.isOpen) {
                const newRef = push(ref(db, "sessions"));
                state.isOpen = true;
                state.currentSessionId = newRef.key;
                await set(ref(db, "sessions/" + newRef.key), {
                    createdAt: Date.now(),
                    scores: { Serkan: 0, Deniz: 0, Fırat: 0, Berkay: 0 }
                });
                sessionOpen = true;
                currentSessionId = newRef.key;
            } else {
                state.isOpen = false;
                state.currentSessionId = null;
                sessionOpen = false;
                currentSessionId = null;
            }
            await set(refState, state);
            document.getElementById("sessionBtn").innerText = sessionOpen ? "⏹️" : "⏺️";

        };

        window.showSession = async function () {
            if (!sessionOpen) return;
            const snap = await get(ref(db, "sessions/" + currentSessionId + "/scores"));
            if (!snap.exists()) return;
            const scores = snap.val();
            const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
            let html = "<ol style='text-align:left;'>";
            sorted.forEach(([name, score]) => {
                html += `<li>${name} (${score})</li>`;
            });
            html += "</ol>";
            document.getElementById("sessionTable").innerHTML = html;
            document.getElementById("sessionPanel").style.display = "flex";

        }

        window.closeSession = function () {
            document.getElementById("sessionPanel").style.display = "none";
        }

        // =========================================================
        // LEAGUE
        // =========================================================

        async function updateLeague() {
            const refL = ref(db, "league");
            const snap = await get(refL);
            let league = snap.exists() ? snap.val() : {};

            playerNames.forEach(p => league[p] = league[p] || 0);
            const sorted = [...gameState.scores]
                .map((s, i) => ({ s, i }))
                .sort((a, b) => b.s - a.s);
            league[playerNames[sorted[0].i]] += 3;
            league[playerNames[sorted[1].i]] += 1;
            await set(refL, league);
        }

        window.openLeague = async function () {
            const snap = await get(ref(db, "league"));
            const league = snap.exists() ? snap.val() : {};
            const rows = Object.entries(league).sort((a, b) => b[1] - a[1]);
            let html = "<ol>";
            rows.forEach(([name, point]) => {
                html += `<li>${name} (${point})</li>`;
            });
            html += "</ol>";
            document.getElementById("leagueTable").innerHTML = html;
            document.getElementById("leaguePanel").style.display = "flex";
        }

        window.closeLeague = function () {
            document.getElementById("leaguePanel").style.display = "none";
        }

        // =========================================================
        // REBUILD TABLE
        // =========================================================

        function rebuildTable() {
            const tbody = document.getElementById("scoreTable");
            tbody.innerHTML = "";
            tbody.innerHTML += `<tr><td>0</td><td>20</td><td>20</td><td>20</td><td>20</td></tr>`;
            gameState.rows.forEach(row => {
                let html = `<tr><td>${row.round}</td>`;
                row.scores.forEach((score, i) => {
                    if (i === row.player) {
                        html += `<td style="color:red;">${row.value > 0 ? "+" : ""}${row.value}</td>`;
                    } else {
                        html += `<td>${score}</td>`;
                    }
                });
                html += "</tr>";
                tbody.innerHTML += html;
            });
            if (gameState.finished) {
                const sorted = [...gameState.scores].sort((a, b) => b - a);
                let html = `<tr class="resultsRow"><td></td>`;
                gameState.scores.forEach(s => {
                    const rank = sorted.indexOf(s) + 1;
                    html += `<td><b>${s}</b><br>${rank}</td>`;
                });
                html += "</tr>";
                tbody.innerHTML += html;
            }
            document.getElementById("newGameBtn").disabled = !gameState.finished;
        }

        // =========================================================
        // UNDO
        // =========================================================

        window.undo = async function () {
            if (gameState.rows.length === 0) return;
            const wasFinished = gameState.finished;
            const prevRanking = gameState.finalRanking;
            gameState.rows.pop();
            gameState.scores = [20, 20, 20, 20];
            gameState.round = 0;
            gameState.rows.forEach(r => {
                if (r.value < 0) {
                    gameState.scores[r.player] += r.value;
                } else {
                    for (let i = 0; i < 4; i++) {
                        if (i !== r.player) {
                            gameState.scores[i] -= r.value;
                        }
                    }
                }
                if (r.value !== 1) gameState.round++;
            });
            if (wasFinished && prevRanking) {
                gameState.finished = false;
                gameState.finalRanking = null;
                const refL = ref(db, "league");
                const snap = await get(refL);
                if (snap.exists()) {
                    let league = snap.val();
                    league[playerNames[prevRanking[0]]] -= 3;
                    league[playerNames[prevRanking[1]]] -= 1;
                    await set(refL, league);
                }
                if (sessionOpen && currentSessionId) {
                    const refS = ref(db, "sessions/" + currentSessionId + "/scores");
                    const snap = await get(refS);
                    if (snap.exists()) {
                        let data = snap.val();
                        data[playerNames[prevRanking[0]]] -= 3;
                        data[playerNames[prevRanking[1]]] -= 1;
                        await set(refS, data);
                    }
                }
            }
            await saveGame();
        }

        // =========================================================
        // OUTSIDE CLICK EVENTS
        // =========================================================

        document.getElementById("actionsPanel").addEventListener("click", e => {
            if (e.target.id === "actionsPanel") closePanel();
        });

        document.getElementById("leaguePanel").addEventListener("click", e => {
            if (e.target.id === "leaguePanel") closeLeague();
        });

        document.getElementById("sessionPanel").addEventListener("click", e => {
            if (e.target.id === "sessionPanel") closeSession();
        });
    </script>
</body>

</html>

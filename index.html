<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <title>Okey Yazboz</title>

    <link href="https://fonts.googleapis.com/css2?family=Rock+Salt&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            background: black;
            display: flex;
            flex-direction: column;
            width: 100dvw;
            height: 100dvh;
            overflow: hidden;
        }

        #notepad {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            background-image: url("background.jpg");
            background-size: cover;
            overflow-y: auto;
        }

        #notepad::before {
            content: "";
            position: absolute;
            top: 0;
            bottom: 0;
            left: 10%;
            width: 2px;
            background: red;
        }

        #notepad>table {
            width: 100%;
            border-collapse: collapse;
            font-family: 'Rock Salt';
            position: relative;
        }

        #notepad>table>thead {
            line-height: 10dvw;
            font-size: 4dvw;
            color: white;
            background: sienna;
        }

        #notepad>table>tbody {
            line-height: 12dvw;
            font-size: 8dvw;
            text-align: center;
        }

        .resultsRow {
            border-top: 1px solid black;
            font-weight: bold;
            color: red;
            vertical-align: top;
        }

        .panel {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .9);
            font-size: 6dvw;
            color: white;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .panel button {
            font-size: 6dvw;
            width: 80%;
        }
    </style>
</head>

<body>
    <div id="menuPanel" class="panel">
        <table width="80%">
            <tr>
                <td id="leagueTable"></td>
                <td id="sessionTable"></td>
            </tr>
        </table>
        <button id="newGameBtn" onclick="createNewGame()">Yeni Oyun</button>
        <button id="sessionBtn" onclick="toggleSession()"></button>
        <button id="undoBtn" onclick="undo()">↩ Geri Al</button>
        <p style="font-size: 3dvw;">YazBoz 1.0 by F.AKS. 13.05.2026</p>
    </div>

    <div id="notepad">
        <table>
            <thead>
                <tr>
                    <th onclick="openMenu()">#</th>
                    <th name="playerName" onclick="selectPlayer(this,0)">Serkan</th>
                    <th name="playerName" onclick="selectPlayer(this,1)">Deniz</th>
                    <th name="playerName" onclick="selectPlayer(this,2)">Fırat</th>
                    <th name="playerName" onclick="selectPlayer(this,3)">Berkay</th>
                </tr>
            </thead>
            <tbody id="scoreTable"></tbody>
        </table>
    </div>

    <div id="actionsPanel" class="panel">
        <button id="gostergeButton" onclick="applyScore(1)">Gösterge ➕ 1</button>
        <button id="penaltyButton" onclick="applyScore(-2)">Ceza ➖ 2</button>
        <button id="doubleButton" onclick="toggleDouble()">Renk ✖️ 1</button>
        <button id="normalButton" onclick="applyScore(2)">Normal ✔️ 2</button>
        <button id="okeyButton" onclick="applyScore(4)">Okey ⭕️ 4</button>
    </div>

    <script type="module">

        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js"; // Firebase uygulamasını başlatmak için
        import { getDatabase, ref, get, set, push, onValue, runTransaction } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js"; // Realtime Database fonksiyonları

        const firebaseConfig = {
            apiKey: "AIzaSyDi0ujxXS-pOoKYei3l2wTDdgE107waz2c", // API anahtarı
            authDomain: "yazboz-6588f.firebaseapp.com", // Auth domain
            databaseURL: "https://yazboz-6588f-default-rtdb.europe-west1.firebasedatabase.app", // Veritabanı URL'i
            projectId: "yazboz-6588f", // Proje ID
            storageBucket: "yazboz-6588f.firebasestorage.app", // Storage bucket
            messagingSenderId: "7696379579", // Mesajlaşma ID
            appId: "1:7696379579:web:7c5270d6611253af8e039e" // Uygulama ID
        };

        const app = initializeApp(firebaseConfig); // Firebase uygulamasını başlat
        const db = getDatabase(app); // Veritabanı bağlantısını al
        const playerNames = ["Serkan", "Deniz", "Fırat", "Berkay"]; // Oyuncu isimleri

        let currentGameId = null; // Aktif oyunun Firebase ID'si
        let currentSessionId = null; // Aktif oturumun Firebase ID'si
        let sessionOpen = false; // Oturum açık mı?

        const gameState = { scores: [20, 20, 20, 20], activePlayer: null, round: 0, doubleMode: false, finished: false, rows: [] };

        loadCurrentGame(); // Sayfa açılınca mevcut oyunu yükle

        async function loadCurrentGame() {
            const snap = await get(ref(db, "currentGameId")); // Firebase'den aktif oyun ID'sini al
            if (!snap.exists()) return; // Kayıt yoksa çık
            currentGameId = snap.val(); // ID'yi global değişkene ata
            listenGame(); // Oyunu dinlemeye başla
        }

        let lastFinishedState = false; // Son render'daki bitiş durumu (tekrar güncellemeyi önler)
        let lastGameSnapshot = null; // Son gelen Firebase snapshot'ı
        let finalSnapshot = null; // Oyun bitince skorları korumak için anlık görüntü

        function listenGame() {
            onValue(ref(db, "games/" + currentGameId), (snap) => { // Oyun verisini gerçek zamanlı dinle
                if (!snap.exists()) return; // Veri yoksa çık
                const g = snap.val(); // Firebase verisini al
                lastGameSnapshot = g; // Son snapshot'ı sakla
                if (g.finished) { // Oyun bittiyse
                    finalSnapshot = g; // Final skorlarını kaydet
                }
                gameState.scores = g.scores || [20, 20, 20, 20]; // Skorları güncelle
                gameState.rows = g.rows || []; // Tur satırlarını güncelle
                gameState.round = g.round || 0; // Tur sayısını güncelle
                gameState.finished = g.finished || false; // Bitiş durumunu güncelle
                gameState.finalRanking = g.finalRanking || null; // Final sıralamasını güncelle
                render(); // Tabloyu yeniden çiz
            });
        }

        // Menüyü açarken güncel oturum + lig verilerini yükle
        window.openMenu = async function () {
            menuPanel.style.display = "flex";
            await loadMenuTables();
        };

        async function loadMenuTables() {
            // Lig tablosu
            const snapL = await get(ref(db, "league"));
            const league = snapL.exists() ? snapL.val() : {};
            const rows = Object.entries(league).sort((a, b) => b[1] - a[1]);
            let html = "<b>7. Lig</b><br><small style='font-size : 4dvw;'>14.04.2026</small><ol>";
            rows.forEach(([name, point]) => {
                html += `<li>${name} (${point})</li>`;
            });
            html += "</ol>";
            document.getElementById("leagueTable").innerHTML = html;

            // Oturum tablosu
            const snapState = await get(ref(db, "sessionState"));
            if (snapState.exists()) {
                const state = snapState.val();
                if (state.isOpen && state.currentSessionId) {
                    const snap = await get(ref(db, "sessions/" + state.currentSessionId));
                    if (snap.exists()) {
                        const session = snap.val();
                        const scores = session.scores;
                        const sessionNumber = session.sessionNumber || state.sessionNumber || 1;
                        const startedAt = new Date(session.createdAt).toLocaleString("tr-TR");

                        const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
                        let html = `<b>${sessionNumber}. Oturum</b><br><small style="font-size : 4dvw;">${startedAt}</small><ol>`;
                        sorted.forEach(([name, score]) => {
                            html += `<li>${name} (${score})</li>`;
                        });
                        html += "</ol>";
                        document.getElementById("sessionTable").innerHTML = html;
                    }
                } else {
                    document.getElementById("sessionTable").innerHTML = "";
                }
            }
        }

        window.selectPlayer = function (el, index) {
            if (gameState.finished) return; // Oyun bittiyse seçim yapma
            gameState.activePlayer = index; // Seçilen oyuncuyu kaydet
            document.querySelectorAll('[name="playerName"]').forEach(e => e.style.color = ""); // Tüm isim renklerini sıfırla
            el.style.color = "yellow"; // Seçilen oyuncuyu sarıya boyа
            actionsPanel.style.display = "flex"; // Aksiyon panelini göster
        };

        window.toggleDouble = function (btn) {
            gameState.doubleMode = !gameState.doubleMode; // Çift modu aç/kapat
            gameState.baseScore = gameState.doubleMode ? 4 : 2; // Temel skoru güncelle
            doubleButton.innerText = gameState.doubleMode ? "Renk ❌ 2" : "Renk ✖️ 1"; // Buton metnini güncelle
            penaltyButton.innerText = gameState.doubleMode ? "Ceza ➖ 4" : "Ceza ➖ 2"; // Ceza butonunu güncelle
            normalButton.innerText = gameState.doubleMode ? "Normal ➕ 4" : "Normal ➕ 2"; // Normal butonunu güncelle
            okeyButton.innerText = gameState.doubleMode ? "Okey ⭕️ 8" : "Okey ⭕️ 4"; // Okey butonunu güncelle
        }

        window.applyScore = async function (value) {
            if (value !== 1 && gameState.doubleMode) value *= 2; // Çift modda gösterge hariç değeri iki katına çıkar

            const gameRef = ref(db, "games/" + currentGameId); // Oyun Firebase referansı

            await runTransaction(gameRef, (g) => { // Eş zamanlı çakışmaları önlemek için transaction kullan
                if (!g) return g; // Veri yoksa çık
                if (g.finished) return g; // Oyun bittiyse işlem yapma

                const p = gameState.activePlayer; // Aktif oyuncunun indexi

                if (p === null) return g; // Oyuncu seçilmemişse çık

                if (value < 0) { // Ceza durumunda
                    g.scores[p] += value; // Seçili oyuncunun skorunu düşür
                } else { // Kazanma durumunda
                    for (let i = 0; i < 4; i++) {
                        if (i !== p) g.scores[i] -= value; // Diğer oyuncuların skorunu düşür
                    }
                }

                if (value !== 1) g.round++; // Gösterge değilse tur sayısını artır

                g.rows = g.rows || []; // Satır dizisi yoksa oluştur
                g.rows.push({ round: g.round, scores: [...g.scores], player: p, value }); // Yeni turu kaydet

                const losers = g.scores.filter(s => s <= 0).length; // Sıfır veya altına düşen oyuncu sayısı

                if (losers >= 2 && !g.finished) { // İki veya daha fazla oyuncu bittiyse
                    g.finished = true; // Oyunu bitir
                    const ranking = g.scores
                        .map((s, i) => ({ i, s }))
                        .sort((a, b) => b.s - a.s); // Skora göre sırala
                    g.finalRanking = ranking.map(r => r.i); // Sıralı oyuncu indexlerini kaydet
                }
                return g; // Güncellenmiş veriyi döndür
            });

            closeActionsPanel(); // Aksiyon panelini kapat
        };

        function closeActionsPanel() {
            document.getElementsByName("playerName").forEach(e => e.style.color = ""); // İsim renklerini sıfırla
            gameState.activePlayer = null; // Aktif oyuncuyu temizle
            gameState.doubleMode = false; // Çift modu kapat
            gameState.baseScore = 2; // Temel skoru sıfırla
            doubleButton.innerText = "Renk ✖️ 1"; // Çift butonunu sıfırla
            penaltyButton.innerText = "Ceza ➖ 2"; // Ceza butonunu sıfırla
            normalButton.innerText = "Normal ➕ 2"; // Normal butonu sıfırla
            okeyButton.innerText = "Okey ⭕️ 4"; // Okey butonu sıfırla
            actionsPanel.style.display = "none"; // Aksiyon panelini gizle
        }

        document.getElementById("actionsPanel").addEventListener("click", e => {
            if (e.target.id === "actionsPanel") closeActionsPanel(); // Arka plana tıklanınca paneli kapat
        });

        function render() {
            scoreTable.innerHTML = ""; // Tabloyu temizle
            scoreTable.innerHTML += `<tr><td>0</td><td>20</td><td>20</td><td>20</td><td>20</td></tr>`; // Başlangıç skorlarını ekle

            gameState.rows.forEach(r => { // Her tur için satır oluştur
                let tr = `<tr><td>${r.round}</td>`; // Tur numarasını ekle

                r.scores.forEach((score, i) => {
                    if (i === r.player) { // Bu turun aktif oyuncusu ise
                        tr += `<td style="color:red; font-weight:bold;">${r.value > 0 ? "+" : ""}${r.value}</td>`; // Değişimi kırmızı göster
                    } else {
                        tr += `<td>${score}</td>`; // Güncel skoru göster
                    }
                });
                tr += "</tr>"; // Satırı kapat
                scoreTable.innerHTML += tr; // Tabloya ekle
            });

            const sourceScores = finalSnapshot?.scores || gameState.scores; // Final varsa onu, yoksa güncel skorları kullan
            const ranking =
                gameState.finalRanking || // Kaydedilmiş sıralama varsa kullan
                (gameState.finished
                    ? [...sourceScores]
                        .map((s, i) => ({ i, s }))
                        .sort((a, b) => b.s - a.s)
                        .map(r => r.i) // Skordan hesapla
                    : null);

            if (gameState.finished && ranking) { // Oyun bittiyse sonuç satırını ekle
                let tr = `<tr class="resultsRow"><td></td>`;

                for (let i = 0; i < 4; i++) { // Her oyuncu için
                    const score = sourceScores[i]; // Oyuncunun skoru
                    const rank = ranking.indexOf(i); // Oyuncunun sıradaki konumu

                    if (rank === 0) {
                        tr += `<td>${score}<br>🥇</td>`; // Birinci
                    } else if (rank === 1) {
                        tr += `<td>${score}<br>🥈</td>`; // İkinci
                    } else {
                        tr += `<td>${score}</td>`; // Diğerleri
                    }
                }

                tr += "</tr>"; // Satırı kapat
                scoreTable.innerHTML += tr; // Tabloya ekle
            }

            if (gameState.finished && !lastFinishedState) { // Oyun yeni bittiyse (tekrar çalışmasın)
                lastFinishedState = true; // Bayrağı işaretle
                updateScores(); // Oturum ve lig puanlarını güncelle
            }

            if (!gameState.finished) { // Oyun devam ediyorsa
                lastFinishedState = false; // Bayrağı sıfırla
                finalSnapshot = null; // Final snapshot'ı temizle
            }

            newGameBtn.disabled = !gameState.finished; // Yeni oyun butonu sadece oyun bitince aktif
        }

        async function updateScores() {
            const snap = await get(ref(db, "games/" + currentGameId)); // Oyun verisini Firebase'den al
            if (!snap.exists()) return; // Veri yoksa çık
            if (snap.val().scoresUpdated) return; // Puanlar zaten güncellendiyse tekrar güncelleme

            const ranking =
                gameState.finalRanking || // Kaydedilmiş sıralama varsa kullan
                [...gameState.scores]
                    .map((s, i) => ({ i, s }))
                    .sort((a, b) => b.s - a.s)
                    .map(r => r.i); // Yoksa hesapla

            const first = ranking[0]; // Birinci oyuncunun indexi
            const second = ranking[1]; // İkinci oyuncunun indexi

            const snapState = await get(ref(db, "sessionState")); // Oturum durumunu Firebase'den al
            if (!snapState.exists()) return; // Veri yoksa çık

            const state = snapState.val(); // Oturum verisini al
            if (!state.isOpen || !state.currentSessionId) return; // Oturum kapalıysa güncelleme

            await updateSession(first, second, state.currentSessionId); // Oturum puanlarını güncelle
            await updateLeague(first, second); // Lig puanlarını güncelle
            await set(ref(db, "games/" + currentGameId + "/scoresUpdated"), true); // Güncelleme bayrağını yaz
        }

        async function updateSession(firstIndex, secondIndex, sessionId) {
            const refS = ref(db, "sessions/" + sessionId + "/scores"); // Oturum skorları referansı
            const snap = await get(refS); // Mevcut oturum skorlarını al

            if (!snap.exists()) return; // Veri yoksa çık

            const data = snap.val(); // Skor verisini al

            data[playerNames[firstIndex]] = (data[playerNames[firstIndex]] || 0) + 3; // Birinciye 3 puan
            data[playerNames[secondIndex]] = (data[playerNames[secondIndex]] || 0) + 1; // İkinciye 1 puan

            await set(refS, data); // Güncellenmiş skorları kaydet
        }

        async function updateLeague(firstIndex, secondIndex) {
            const refL = ref(db, "league"); // Lig referansı
            const snap = await get(refL); // Mevcut lig verilerini al

            let league = snap.exists() ? snap.val() : {}; // Veri varsa al, yoksa boş obje

            playerNames.forEach(p => league[p] = league[p] || 0); // Kayıtsız oyuncuları 0'dan başlat

            league[playerNames[firstIndex]] += 3; // Birinciye 3 lig puanı
            league[playerNames[secondIndex]] += 1; // İkinciye 1 lig puanı

            await set(refL, league); // Güncellenmiş lig verilerini kaydet
        }

        document.getElementById("menuPanel").addEventListener("click", e => {
            if (e.target.id === "menuPanel") menuPanel.style.display = "none"; // Arka plana tıklanınca menüyü kapat
        });

        window.createNewGame = async function () {
            const newGameRef = push(ref(db, "games")); // Yeni oyun için Firebase'de benzersiz key oluştur
            const newGame = { scores: [20, 20, 20, 20], activePlayer: null, round: 0, doubleMode: false, finished: false, rows: [] }; // Başlangıç oyun verisi

            await set(newGameRef, newGame); // Yeni oyunu Firebase'e kaydet
            await set(ref(db, "currentGameId"), newGameRef.key); // Aktif oyun ID'sini güncelle

            currentGameId = newGameRef.key; // Global değişkeni güncelle
            gameState.scores = [20, 20, 20, 20]; // Skorları sıfırla
            gameState.rows = []; // Satırları temizle
            gameState.round = 0; // Tur sayısını sıfırla
            gameState.finished = false; // Bitiş durumunu sıfırla

            listenGame(); // Yeni oyunu dinlemeye başla
            render(); // Tabloyu yeniden çiz
        };

        window.toggleSession = async function () {
            const refState = ref(db, "sessionState"); // Oturum durumu referansı
            const snap = await get(refState); // Mevcut oturum durumunu al

            let state = snap.exists() ? snap.val() : { isOpen: false, currentSessionId: null }; // Veri varsa al, yoksa varsayılan

            if (!state.isOpen) { // Oturum kapalıysa yeni oturum başlat
                const newRef = push(ref(db, "sessions")); // Yeni oturum için Firebase'de key oluştur

                state.isOpen = true; // Oturumu açık işaretle
                state.currentSessionId = newRef.key; // Oturum ID'sini kaydet
                state.startedAt = Date.now(); // Başlangıç zamanını kaydet
                state.sessionNumber = (state.sessionNumber || 0) + 1; // ← sayacı artır

                await set(ref(db, "sessions/" + newRef.key), {
                    createdAt: Date.now(), // Oluşturulma zamanı
                    sessionNumber: state.sessionNumber, // ← oturuma da yaz
                    scores: { Serkan: 0, Deniz: 0, Fırat: 0, Berkay: 0 } // Başlangıç oturum skorları
                });

                sessionOpen = true; // Global oturum bayrağını aç
                currentSessionId = newRef.key; // Global oturum ID'sini güncelle
            } else { // Oturum açıksa kapat
                state.isOpen = false; // Oturumu kapalı işaretle
                state.currentSessionId = null; // Oturum ID'sini temizle
                state.startedAt = null; // Başlangıç zamanını temizle

                sessionOpen = false; // Global oturum bayrağını kapat
                currentSessionId = null; // Global oturum ID'sini temizle
            }
            await set(refState, state); // Güncellenmiş oturum durumunu kaydet
            await loadMenuTables(); // Güncellenen tabloyu hemen yenile
        };

        onValue(ref(db, "sessionState"), (snap) => { // Oturum durumunu gerçek zamanlı dinle
            if (!snap.exists()) return; // Veri yoksa çık
            const state = snap.val(); // Oturum verisini al
            sessionOpen = state.isOpen;
            sessionBtn.innerText = state.isOpen ? "Oturumu Sonlandır" : "Yeni Oturum"; // Buton metnini güncelle
        });

        window.undo = async function () {
            if (gameState.rows.length === 0) return; // Geri alınacak hamle yoksa çık

            const wasFinished = gameState.finished; // Önceki bitiş durumunu sakla
            const prevRanking = gameState.finalRanking; // Önceki sıralamayı sakla

            gameState.rows.pop(); // Son hamleyi kaldır
            gameState.scores = [20, 20, 20, 20]; // Skorları sıfırla
            gameState.round = 0; // Tur sayısını sıfırla
            gameState.rows.forEach(r => { // Kalan hamlelerden skorları yeniden hesapla
                if (r.value < 0) { // Ceza hamlesi ise
                    gameState.scores[r.player] += r.value; // Oyuncunun skorunu düşür
                } else { // Kazanma hamlesi ise
                    for (let i = 0; i < 4; i++) {
                        if (i !== r.player) {
                            gameState.scores[i] -= r.value; // Diğer oyuncuların skorunu düşür
                        }
                    }
                }
                if (r.value !== 1) gameState.round++; // Gösterge değilse tur say
            });

            if (wasFinished && prevRanking) { // Geri alınan hamle oyunu bitirmişse
                gameState.finished = false; // Bitiş durumunu sıfırla
                gameState.finalRanking = null; // Sıralamayı temizle
                gameState.scoresUpdated = false; // Güncelleme bayrağını sıfırla

                const refL = ref(db, "league"); // Lig referansı
                const snapL = await get(refL); // Mevcut lig verilerini al
                if (snapL.exists()) {
                    let league = snapL.val(); // Lig verisini al
                    league[playerNames[prevRanking[0]]] -= 3; // Birinciden 3 puanı geri al
                    league[playerNames[prevRanking[1]]] -= 1; // İkinciden 1 puanı geri al
                    await set(refL, league); // Güncellenmiş lig verilerini kaydet
                }

                await set(ref(db, "games/" + currentGameId), gameState); // Oyun durumunu Firebase'e kaydet
                menuPanel.style.display = "none"; // Menüyü kapat
            }

            const snapState = await get(ref(db, "sessionState")); // Oturum durumunu Firebase'den al

            if (snapState.exists()) {
                const state = snapState.val(); // Oturum verisini al
                if (state.isOpen && state.currentSessionId) { // Oturum açıksa
                    const refS = ref(db, "sessions/" + state.currentSessionId + "/scores"); // Oturum skoru referansı
                    const snapS = await get(refS); // Mevcut oturum skorlarını al
                    if (snapS.exists()) {
                        let data = snapS.val(); // Skor verisini al
                        data[playerNames[prevRanking[0]]] -= 3; // Birinciden 3 oturum puanını geri al
                        data[playerNames[prevRanking[1]]] -= 1; // İkinciden 1 oturum puanını geri al
                        await set(refS, data); // Güncellenmiş oturum skorlarını kaydet
                    }
                }
            }
        }
    </script>
</body>

</html>

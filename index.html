<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <title>Okey Yazboz</title>

    <link href="https://fonts.googleapis.com/css2?family=Rock+Salt&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            background-color: black;

            display: flex;
            flex-direction: column;

            width: 100dvw;
            height: 100dvh;
        }

        #notepad {
            flex: 1;
            position: relative;

            overflow-y: auto;

            background-image: url("background.jpg");
        }

        #notepad::before {
            content: "";
            position: absolute;
            top: 0;
            bottom: 0;
            left: 10%;
            width: 2px;
            background: red;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-family: 'Rock Salt';
        }

        thead {
            line-height: 6dvh;
            font-size: 2dvh;
            color: white;
            background: Sienna;
        }

        tbody {
            line-height: 5dvh;
            font-size: 3dvh;
            text-align: center;
        }

        .highlight {
            color: yellow;
        }

        .plus {
            color: red;
        }

        .results {
            border-top: 1px solid black;
            vertical-align: top;
            font-weight: bold;
            color: red;
        }

        #actions {
            position: fixed;
            inset: 0;

            display: flex;
            justify-content: center;
            align-items: center;

            gap: 1%;

            opacity: 0;
            pointer-events: none;
            transition: 0.25s ease;
        }

        #actions.open {
            opacity: 1;
            pointer-events: auto;
            background: rgba(0, 0, 0, 0.6);
        }

        #actions button {
            width: 18%;
            font-size: 5dvh;
            padding: 2%;
        }
    </style>
</head>

<body>
    <div id="notepad">
        <table>
            <thead>
                <tr>
                    <th width="10%" onclick="simulateGame()">x</th>
                    <th name="player" width="20%" onclick="selectCell(this,0)">Serkan</th>
                    <th name="player" width="20%" onclick="selectCell(this,1)">Deniz</th>
                    <th name="player" width="20%" onclick="selectCell(this,2)">Fırat</th>
                    <th name="player" width="20%" onclick="selectCell(this,3)">Berkay</th>
                </tr>
            </thead>
            <tbody id="tbody">
                <tr>
                    <td>0</td>
                    <td>20</td>
                    <td>20</td>
                    <td>20</td>
                    <td>20</td>
                </tr>
            </tbody>
        </table>

        <div id="actions">
            <button onclick="toggle(this)" id="double">✖️</button>
            <button onclick="minus(1)">➕</button>
            <button onclick="next()" id="type">➖</button>
            <button onclick="minus(game[type].value)">✔️</button>
            <button onclick="minus(game[type].value * 2)">⭕️</button>
        </div>

        <script>
            let winner = null;
            let scores = [20, 20, 20, 20];
            let round = 0;
            let type = 0;
            let renk = false;
            let end = false;
            let cooldown = false;

            const icon = {
                on: "❌",
                off: "✖️"
            };

            const game = [
                { name: "normal", icon: "➖", value: 2 },
                { name: "cift", icon: "➗", value: 6 },
                { name: "renkli", icon: "➰", value: 8 }
            ];

            function selectCell(el, index) {
                el.classList.add("highlight");
                winner = index;
                openActions();
            }

            function openActions() {
                document.getElementById("actions").classList.add("open");
            }

            function closeActions() {
                winner = null;

                document.getElementsByName("player")
                    .forEach(el => el.classList.remove("highlight"));

                type = 0;
                document.getElementById("type").innerText = game[type].icon;

                renk = false;
                document.getElementById("double").innerText = icon.off;

                document.getElementById("actions").classList.remove("open");
            }

            function toggle(el) {
                renk = !renk;
                el.innerText = renk ? icon.on : icon.off;
            }

            function next() {
                type = (type + 1) % game.length;
                document.getElementById("type").innerText = game[type].icon;
            }

            function minus(amount) {
                if (amount == 1 && cooldown) return;

                if (amount !== 1 && renk) {
                    amount *= 2;
                }

                for (let i = 0; i < 4; i++) {
                    if (i !== winner) {
                        scores[i] -= amount;
                    }
                }

                if (amount == 1) {
                    cooldown = true
                } else {
                    cooldown = false
                    round++;
                }

                addRow(amount);
                closeActions();
                checkGameOver();
            }

            function addRow(amount) {
                let tr = document.createElement("tr");
                let html = `<td>${round}</td>`;
                scores.forEach((s, i) => {

                    if (i === winner) {
                        html += `<td class="plus">+${amount}</td>`;
                    } else {
                        html += `<td>${s}</td>`;
                    }
                });
                tr.innerHTML = html;
                document.getElementById("tbody").appendChild(tr);
            }

            function checkGameOver() {
                let losers = 0;
                for (let i = 0; i < scores.length; i++) {
                    if (scores[i] <= 0) {
                        losers++;
                    }
                }
                if (losers >= 2) {
                    end = true;
                    addResults();
                }
            }

            function addResults() {
                let tr = document.createElement("tr");
                tr.classList.add("results");
                let html = `<td></td>`;
                let sorted = [...scores].sort((a, b) => b - a);
                scores.forEach(s => {

                    let rank = sorted.indexOf(s);

                    html += `<td><b>${s}</b><br>${rank === 0 ? "1" : rank === 1 ? "2" : ""}</td>`;
                });
                tr.innerHTML = html;
                document.getElementById("tbody").appendChild(tr);
            }

            document.getElementById("actions").addEventListener("click", function (e) {
                if (e.target === this) {
                    closeActions();
                }
            });

            function simulateGame() {
                const amounts = [1, 2, 4, 8];
                let interval = setInterval(() => {
                    if (end) {
                        clearInterval(interval);
                        return;
                    }
                    winner = Math.floor(Math.random() * 4);
                    let amount = amounts[Math.floor(Math.random() * amounts.length)];
                    minus(amount);
                }, 600);
            }
        </script>
</body>

</html>

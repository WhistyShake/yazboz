<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <title>Okey Yazboz — İzleyici</title>
    <link href="https://fonts.googleapis.com/css2?family=Rock+Salt&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="shared.css">
</head>

<body>
    <div id="notepad">
        <table>
            <thead>
                <tr>
                    <th id="menuBtn">#</th>
                    <th>Serkan</th>
                    <th>Deniz</th>
                    <th>Fırat</th>
                    <th>Berkay</th>
                </tr>
            </thead>
            <tbody id="scoreTable"></tbody>
        </table>
    </div>

    <div id="menuPanel" class="panel">
        <table>
            <thead>
                <tr>
                    <th colspan="2">Puan Durumu</th>
                </tr>
            </thead>
            <tbody>
                <tr class="titleRow">
                    <td id="sessionHeader"></td>
                    <td id="leagueHeader"></td>

                </tr>
                <tr class="dateRow">
                    <td id="sessionDateCell"></td>
                    <td id="leagueDateCell"></td>
                </tr>
                <tr>
                    <td id="sessionStats"></td>
                    <td id="leagueStats"></td>

                </tr>
            </tbody>
        </table>
        <br>
        <table>
            <thead>
                <tr>
                    <th colspan="2">Geçmiş</th>
                </tr>
            </thead>
            <tbody>
                <tr class="titleRow">
                    <td id="gameStatusBar">status bar</td>
                </tr>
                <tr>
                    <td id="historyList">içerik</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script type="module">
        import { db, bindRealtimeGame, bindRealtimeHistory, renderScoreTable, renderGameStatus, renderStatsEngine, openMenuPanel } from "./shared.js";

        document.getElementById("menuBtn").addEventListener("click", openMenuPanel);
        document.getElementById("menuPanel").addEventListener("click", function(e) {
            if (e.target === this) this.style.display = "none";
        });

        bindRealtimeGame(db, (g) => {
            const table = document.getElementById("scoreTable");
            const bar = document.getElementById("gameStatusBar");

            if (!g) {
                table.innerHTML = `<tr><td colspan="5">oyun bekleniyor...</td></tr>`;
                bar.textContent = "";
                return;
            }

            renderScoreTable(g);
            renderGameStatus(g.gameNumber, g);
        });

        bindRealtimeHistory(db, (entries) => {
            document.getElementById("historyList").innerHTML =
                entries.map(e =>
                    `<div class="history-entry"><span style="color:#555">${e.time}</span> : ${e.text}</div>`
                ).join("");
        });
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <title>Okey Yazboz — Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Rock+Salt&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="shared.css">
    <style>
        #actionsPanel {
            position: fixed;
            inset: 0;
            color: white;
            background: rgba(0, 0, 0, .8);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
    </style>
</head>

<body>
    <div id="notepad">
        <table>
            <thead>
                <tr>
                    <th id="menuBtn">#</th>
                    <th name="playerName" id="playerBtn0">Serkan</th>
                    <th name="playerName" id="playerBtn1">Deniz</th>
                    <th name="playerName" id="playerBtn2">Fırat</th>
                    <th name="playerName" id="playerBtn3">Berkay</th>
                </tr>
            </thead>
            <tbody id="scoreTable"></tbody>
        </table>
    </div>

    <div id="menuPanel" class="panel">
        <table>
            <thead>
                <tr>
                    <th colspan="2">Puan Durumu</th>
                </tr>
            </thead>
            <tbody>
                <tr class="titleRow">
                    <td id="sessionHeader"></td>
                    <td id="leagueHeader"></td>

                </tr>
                <tr class="dateRow">
                    <td id="sessionDateCell"></td>
                    <td id="leagueDateCell"></td>
                </tr>
                <tr>
                    <td id="sessionStats"></td>
                    <td id="leagueStats"></td>

                </tr>
            </tbody>
        </table>
        <br>
        <table>
            <thead>
                <tr>
                    <th colspan="2">Geçmiş</th>
                </tr>
            </thead>
            <tbody>
                <tr class="titleRow">
                    <td id="gameStatusBar">status bar</td>
                </tr>
                <tr>
                    <td id="historyList">içerik</td>
                </tr>
            </tbody>
        </table>
        <button id="newGameBtn">Yeni Oyun</button>
        <button id="undoBtn">↩ Geri Al</button>
        <button id="endDayBtn">Oturumu Kapat</button>
    </div>

    <div id="actionsPanel">
        <button id="gostergeButton">Gösterge ➕ 1</button>
        <button id="penaltyButton">Ceza ➖ 2</button>
        <button id="doubleButton">Renk ✖️ 1</button>
        <button id="normalButton">Bitti ✔️ 2</button>
        <button id="okeyButton">Okey ⭕️ 4</button>
    </div>

    <script type="module">

        import { getDatabase, ref, get, set, push, onValue, runTransaction } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";
        import { PLAYERS, START, db, todayKey, renderGameStatus, renderStatsEngine, renderScoreTable, openMenuPanel } from "./shared.js";

        const MEDALS = ["1.", "2.", "3.", "4."];

        let gameId = null;
        let gameNumber = 0;
        let lastFinished = false;
        let unsubscribeGame = null;
        let unsubscribeHistory = null;
        let state = { scores: [...START], activePlayer: null, round: 0, doubleMode: false, finished: false, rows: [], finalRanking: null };

        init();

        function updateEndDayVisibility(dayOpen) {
            document.getElementById("endDayBtn").disabled = !dayOpen;
        }

        async function init() {
            const [gameSnap, sessionSnap] = await Promise.all([
                get(ref(db, "currentGameId")),
                get(ref(db, "currentSessionKey"))
            ]);
            const dayOpen = sessionSnap.exists() && !!sessionSnap.val();
            updateEndDayVisibility(dayOpen);

            if (!gameSnap.exists() || !gameSnap.val()) {
                gameId = null;
                render();
                listenHistory();
                return;
            }
            gameId = gameSnap.val();
            await loadGameNumber();
            listenGame();
            listenHistory();
        }

        async function loadGameNumber() {
            const snap = await get(ref(db, "games/" + gameId + "/gameNumber"));
            if (snap.exists()) gameNumber = snap.val();
        }

        function listenGame() {
            if (unsubscribeGame) unsubscribeGame();
            unsubscribeGame = onValue(ref(db, "games/" + gameId), snap => {
                if (!snap.exists()) return;
                const g = snap.val();
                Object.assign(state, {
                    scores: g.scores || [...START],
                    rows: g.rows ? Object.values(g.rows) : [],
                    round: g.round || 0,
                    finished: g.finished || false,
                    finalRanking: g.finalRanking || null
                });
                render();
            });
        }

        function listenHistory() {
            if (unsubscribeHistory) unsubscribeHistory();
            unsubscribeHistory = onValue(ref(db, "history"), snap => {
                if (!snap.exists()) {
                    historyList.innerHTML = "";
                    return;
                }
                const entries = Object.values(snap.val()).sort((a, b) => b.ts - a.ts);
                historyList.innerHTML = entries.map(e => `<div class="history-entry"><span style="color:#555">${e.time}</span> : ${e.text}</div>`).join("");
            });
        }

        function render() {
            if (!gameId) {
                scoreTable.innerHTML = "";
                newGameBtn.innerText = "Yeni Oyun";
                newGameBtn.disabled = false;
                undoBtn.disabled = true;
                return;
            }
            renderScoreTable(state);
            if (state.finished && !lastFinished) {
                lastFinished = true;
                updateScores();
            }
            if (!state.finished) lastFinished = false;
            newGameBtn.disabled = !!(gameId && !state.finished);
            undoBtn.disabled = !gameId || state.rows.length === 0;
        }

        async function updateScores() {
            let alreadyUpdated = false;
            await runTransaction(ref(db, "games/" + gameId + "/scoresUpdated"), current => {
                if (current === true) {
                    alreadyUpdated = true;
                    return current;
                }
                return true;
            });
            if (alreadyUpdated) return;

            const ranking = state.finalRanking || [...state.scores].map((s, i) => ({ i, s })).sort((a, b) => b.s - a.s).map(r => r.i);
            const [first, second] = ranking;
            const sessionKeySnap = await get(ref(db, "currentSessionKey"));
            const activeSession = sessionKeySnap.exists() && sessionKeySnap.val() ? sessionKeySnap.val() : todayKey();
            const resultText = ranking.map((pi, rank) => `${MEDALS[rank]} ${PLAYERS[pi]}`).join(", ");
            await log(`${gameNumber ?? "?"}. oyun bitti: ${resultText}`);
            await runTransaction(ref(db, "sessions/" + activeSession + "/scores"), d => {
                if (!d) d = { Serkan: 0, Deniz: 0, Fırat: 0, Berkay: 0 };
                d[PLAYERS[first]] = (d[PLAYERS[first]] || 0) + 3;
                d[PLAYERS[second]] = (d[PLAYERS[second]] || 0) + 1;
                return d;
            });
            await runTransaction(ref(db, "league"), league => {
                if (!league) league = { Serkan: 0, Deniz: 0, Fırat: 0, Berkay: 0 };
                PLAYERS.forEach(p => league[p] = league[p] || 0);
                league[PLAYERS[first]] += 3;
                league[PLAYERS[second]] += 1;
                return league;
            });
        }

        function selectPlayer(el, index) {
            if (!gameId || state.finished) return;
            state.activePlayer = index;
            document.querySelectorAll('[name="playerName"]').forEach(e => e.style.color = "");
            el.style.color = "yellow";
            actionsPanel.style.display = "flex";
        }

        function toggleDouble() {
            state.doubleMode = !state.doubleMode;
            const x = state.doubleMode;
            doubleButton.innerText = x ? "Renk ❌ 2" : "Renk ✖️ 1";
            penaltyButton.innerText = x ? "Ceza ➖ 4" : "Ceza ➖ 2";
            normalButton.innerText = x ? "Bitti ✔️ 4" : "Bitti ✔️ 2";
            okeyButton.innerText = x ? "Okey ⭕️ 8" : "Okey ⭕️ 4";
        }

        async function applyScore(rawValue) {
            const double = state.doubleMode && rawValue !== 1;
            const value = double ? rawValue * 2 : rawValue;
            const player = PLAYERS[state.activePlayer];
            const round = state.round + (rawValue !== 1 ? 1 : 0);
            const renk = double ? " renge" : "";

            let logText;

            if (rawValue === 1) { logText = `${round}. elde ${player} gösterge gösterdi`; }
            else if (rawValue < 0) { logText = `${round}. elde ${player}${renk} ceza aldı`; }
            else if (rawValue === 2) { logText = `${round}. elde ${player}${renk} bitti`; }
            else if (rawValue === 4) { logText = `${round}. elde ${player}${renk} bastı`; }
            else { logText = `${round}. elde ${player} (${rawValue})`; }

            await runTransaction(ref(db, "games/" + gameId), g => {
                if (!g || g.finished) return g;

                const p = state.activePlayer;
                if (p === null) return g;

                if (value < 0) {
                    g.scores[p] += value;
                } else {
                    for (let i = 0; i < 4; i++)
                        if (i !== p) g.scores[i] -= value;
                }

                if (rawValue !== 1) g.round++;
                g.rows = g.rows || {};
                const rowIndex = Object.keys(g.rows).length;
                g.rows[rowIndex] = { round: g.round, scores: [...g.scores], player: p, value };
                const losers = g.scores.filter(s => s <= 0).length;

                if (losers >= 2 && !g.finished) {
                    g.finished = true;
                    g.finalRanking = [...g.scores]
                        .map((s, i) => ({ i, s }))
                        .sort((a, b) => b.s - a.s)
                        .map(r => r.i);
                }
                return g;
            });
            await log(logText);
            closeActionsPanel();
        }

        async function log(text) {
            const now = new Date();
            const time = now.toLocaleString("tr-TR", { day: "2-digit", month: "2-digit", year: "2-digit", hour: "2-digit", minute: "2-digit" }).replace(",", "");
            await push(ref(db, "history"), { text, time, ts: now.getTime() });
        }

        function closeActionsPanel() {
            document.getElementsByName("playerName").forEach(e => e.style.color = "");
            state.activePlayer = null;
            state.doubleMode = false;
            doubleButton.innerText = "Renk ✖️ 1";
            penaltyButton.innerText = "Ceza ➖ 2";
            normalButton.innerText = "Bitti ✔️ 2";
            okeyButton.innerText = "Okey ⭕️ 4";
            actionsPanel.style.display = "none";
        }

        async function openMenu() {
            renderGameStatus(gameNumber, state);
            await openMenuPanel();
        }

        async function createNewGame() {
            if (gameId && !state.finished) return;
            let sessionKey;
            const currentSessionSnap = await get(ref(db, "currentSessionKey"));
            if (!currentSessionSnap.exists() || !currentSessionSnap.val()) {
                const allSessionsSnap = await get(ref(db, "sessions"));
                const sessionNum = allSessionsSnap.exists() ? Object.keys(allSessionsSnap.val()).length + 1 : 1;
                const d2 = new Date();
                const startDate2 = `${String(d2.getDate()).padStart(2, "0")}.${String(d2.getMonth() + 1).padStart(2, "0")}.${d2.getFullYear()}`;
                const sessionRef = push(ref(db, "sessions"));
                sessionKey = sessionRef.key;
                await set(sessionRef, {
                    sessionNumber: sessionNum,
                    startDate: startDate2,
                    gameCount: 0,
                    scores: { Serkan: 0, Deniz: 0, Fırat: 0, Berkay: 0 }
                });
                await set(ref(db, "currentSessionKey"), sessionKey);
                updateEndDayVisibility(true);
                await log(`${sessionNum}. oturum açıldı`);
            } else {
                sessionKey = currentSessionSnap.val();
            }

            const countSnap = await get(ref(db, "sessions/" + sessionKey + "/gameCount"));
            const count = countSnap.exists() ? countSnap.val() + 1 : 1;
            await set(ref(db, "sessions/" + sessionKey + "/gameCount"), count);
            gameNumber = count;
            const newRef = push(ref(db, "games"));
            await set(newRef, { scores: [...START], round: 0, finished: false, rows: {}, gameNumber: count, sessionKey });
            await set(ref(db, "currentGameId"), newRef.key);
            gameId = newRef.key;
            Object.assign(state, { scores: [...START], rows: [], round: 0, finished: false, finalRanking: null });
            lastFinished = false;
            await log(`${count}. oyun başladı`);
            listenGame();
            render();
            menuPanel.style.display = "none";
        }

        async function endDay() {
            if (!confirm("Oturumu bitirmek istediğinden emin misin?")) return;
            const currentSessionSnap = await get(ref(db, "currentSessionKey"));
            if (!currentSessionSnap.exists() || !currentSessionSnap.val()) {
                alert("Açık bir oturum yok!");
                return;
            }
            const sessionKey = currentSessionSnap.val();
            const scoresSnap = await get(ref(db, "sessions/" + sessionKey + "/scores"));
            const scores = scoresSnap.exists() ? scoresSnap.val() : {};
            const sorted = Object.entries(scores)
                .filter(([name]) => PLAYERS.includes(name))
                .sort((a, b) => b[1] - a[1]);
            const dateStr = scoresSnap.exists()
                ? (await get(ref(db, "sessions/" + sessionKey + "/startDate"))).val() || sessionKey
                : sessionKey;
            const sessionNumSnap = await get(ref(db, "sessions/" + sessionKey + "/sessionNumber"));
            const sessionNum = sessionNumSnap.exists() ? sessionNumSnap.val() : "?";
            const summary = sorted.length
                ? sorted.map(([n, p]) => `${n}(${p})`).join(", ")
                : "oyun yok";
            await log(`${sessionNum}. oturum bitti (${dateStr}): ${summary}`);
            await set(ref(db, "currentSessionKey"), null);
            await set(ref(db, "currentGameId"), null);
            gameId = null;
            if (unsubscribeGame) { unsubscribeGame(); unsubscribeGame = null; }
            Object.assign(state, { scores: [...START], rows: [], round: 0, finished: false, finalRanking: null });
            lastFinished = false;
            updateEndDayVisibility(false);
            render();
            menuPanel.style.display = "none";
        }

        async function undo() {
            if (state.rows.length === 0) return;
            const wasFinished = state.finished;
            const prevRanking = state.finalRanking;
            await runTransaction(ref(db, "games/" + gameId), g => {
                if (!g || !g.rows) return g;
                const keys = Object.keys(g.rows).map(Number).sort((a, b) => a - b);
                if (keys.length === 0) return g;
                const lastKey = keys[keys.length - 1];
                delete g.rows[lastKey];
                g.scores = [...START];
                Object.values(g.rows).forEach(r => {
                    if (r.value < 0) {
                        g.scores[r.player] += r.value;
                    } else {
                        for (let i = 0; i < 4; i++)
                            if (i !== r.player) g.scores[i] -= r.value;
                    }
                });
                const remaining = Object.values(g.rows);
                g.round = remaining.length > 0
                    ? remaining[remaining.length - 1].round
                    : 0;

                g.finished = false;
                g.finalRanking = null;
                g.scoresUpdated = false;
                return g;
            });
            if (wasFinished && prevRanking) {
                const sessionKeySnap = await get(ref(db, "currentSessionKey"));
                const activeSession = sessionKeySnap.exists() && sessionKeySnap.val() ? sessionKeySnap.val() : todayKey();
                await runTransaction(ref(db, "sessions/" + activeSession + "/scores"), d => {
                    if (!d) return d;
                    d[PLAYERS[prevRanking[0]]] -= 3;
                    d[PLAYERS[prevRanking[1]]] -= 1;
                    return d;
                });
                await runTransaction(ref(db, "league"), league => {
                    if (!league) return league;
                    league[PLAYERS[prevRanking[0]]] -= 3;
                    league[PLAYERS[prevRanking[1]]] -= 1;
                    return league;
                });
            }
            await log(`${gameNumber ?? "?"}. oyun — son hamle geri alındı`);
            menuPanel.style.display = "none";
        }

        // --- Event listener bağlantıları ---
        document.getElementById("menuBtn").addEventListener("click", openMenu);
        document.getElementById("menuPanel").addEventListener("click", function(e) {
            if (e.target === this) this.style.display = "none";
        });
        document.getElementById("actionsPanel").addEventListener("click", function(e) {
            if (e.target === this) closeActionsPanel();
        });

        [0, 1, 2, 3].forEach(i => {
            document.getElementById("playerBtn" + i).addEventListener("click", function() {
                if (!gameId || state.finished) return;
                state.activePlayer = i;
                document.querySelectorAll('[name="playerName"]').forEach(e => e.style.color = "");
                this.style.color = "yellow";
                actionsPanel.style.display = "flex";
            });
        });

        document.getElementById("gostergeButton").addEventListener("click", () => applyScore(1));
        document.getElementById("penaltyButton").addEventListener("click", () => applyScore(-2));
        document.getElementById("doubleButton").addEventListener("click", toggleDouble);
        document.getElementById("normalButton").addEventListener("click", () => applyScore(2));
        document.getElementById("okeyButton").addEventListener("click", () => applyScore(4));
        document.getElementById("newGameBtn").addEventListener("click", createNewGame);
        document.getElementById("undoBtn").addEventListener("click", undo);
        document.getElementById("endDayBtn").addEventListener("click", endDay);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Okey Yazboz — Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Michroma&family=Rock+Salt&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="shared.css">
    <style>
        #actionsPanel {
            position: fixed;
            inset: 0;
            color: white;
            background: rgba(0, 0, 0, .8);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            gap: 20px;
        }
        #actionsPanel > button {
            font-size: 8dvw;
            width: 80dvw;
            height: 10dvh;
        }
        #controlMenu {
            flex-shrink: 0;
            width: 100%;
            display: flex;
            justify-content: space-around;
            padding: 5px 0;
            background-color: darkred;
        }
        #controlMenu > button {
            width: 30dvw;
            font-size: 2dvw;
            color: white;
            background-color: transparent;
            border-style: hidden;
        }
    </style>
</head>
<body>
    <div id="notepad">
        <table>
            <thead>
                <tr>
                    <th onclick="openMenu()">☰</th>
                    <th name="playerName" onclick="selectPlayer(this,0)">Serkan</th>
                    <th name="playerName" onclick="selectPlayer(this,1)">Deniz</th>
                    <th name="playerName" onclick="selectPlayer(this,2)">Fırat</th>
                    <th name="playerName" onclick="selectPlayer(this,3)">Berkay</th>
                </tr>
            </thead>
            <tbody id="scoreTable"></tbody>
        </table>
    </div>
    <div id="menuPanel" onclick="this.style.display='none'">
        <table>
            <thead>
                <tr><th colspan="2">🏆 Puan Durumu</th></tr>
            </thead>
            <tbody>
                <tr class="titleRow">
                    <td id="sessionHeader"></td>
                    <td id="leagueHeader"></td>
                </tr>
                <tr class="dateRow">
                    <td id="sessionDateCell"></td>
                    <td id="leagueDateCell"></td>
                </tr>
                <tr>
                    <td id="sessionStats"></td>
                    <td id="leagueStats"></td>
                </tr>
            </tbody>
        </table>
        <br>
        <table>
            <thead>
                <tr><th colspan="2">📜 Geçmiş</th></tr>
            </thead>
            <tbody>
                <tr><td id="gameStatusBar"></td></tr>
                <tr><td id="historyList"></td></tr>
            </tbody>
        </table>
        <br>
        <div id="controlMenu">
            <button id="newGameBtn" onclick="createNewGame()"><span style="font-size:8dvw">🆕</span><br>Yeni Oyun</button>
            <button id="endDayBtn" onclick="endDay()"><span style="font-size:8dvw">⏹️</span><br>Gün Sonu</button>
            <button id="undoBtn" onclick="undo()"><span style="font-size:8dvw">↩️</span><br>Geri Al</button>
        </div>
    </div>
    <div id="actionsPanel" onclick="if(event.target===this)closeActionsPanel()">
        <button id="gostergeButton" onclick="applyScore(1)">Gösterge ➕1</button>
        <button id="penaltyButton" onclick="applyScore(-2)">Ceza ➖2</button>
        <button id="doubleButton" onclick="toggleDouble()">Renk ✖️1</button>
        <button id="normalButton" onclick="applyScore(2)">Bitti ✔️2</button>
        <button id="okeyButton" onclick="applyScore(4)">Okey ⭕️4</button>
    </div>

    <script type="module">
        import { getDatabase, ref, get, set, push, onValue, runTransaction }
            from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";
        import { db, PLAYERS, START, renderScoreTable, openMenuPanel, renderGameStatus }
            from "./shared.js";

        const scoreTableEl  = document.getElementById("scoreTable");
        const newGameBtn    = document.getElementById("newGameBtn");
        const undoBtn       = document.getElementById("undoBtn");
        const endDayBtn     = document.getElementById("endDayBtn");
        const menuPanelEl   = document.getElementById("menuPanel");
        const actionsPanelEl = document.getElementById("actionsPanel");
        const doubleButtonEl = document.getElementById("doubleButton");
        const penaltyButtonEl = document.getElementById("penaltyButton");
        const normalButtonEl  = document.getElementById("normalButton");
        const okeyButtonEl    = document.getElementById("okeyButton");
        const historyListEl   = document.getElementById("historyList");

        let gameId = null;
        let gameNumber = 0;
        let lastFinished = false;
        let unsubscribeGame = null;
        let unsubscribeHistory = null;

        let state = {
            scores: [...START],
            activePlayer: null,
            round: 0,
            doubleMode: false,
            finished: false,
            rows: [],
            finalRanking: null
        };

        init();

        function updateEndDayVisibility(dayOpen) {
            endDayBtn.disabled = !dayOpen;
        }

        async function init() {
            const [gameSnap, sessionSnap] = await Promise.all([
                get(ref(db, "currentGameId")),
                get(ref(db, "currentSessionKey"))
            ]);
            const dayOpen = sessionSnap.exists() && !!sessionSnap.val();
            updateEndDayVisibility(dayOpen);
            if (!gameSnap.exists() || !gameSnap.val()) {
                gameId = null;
                render();
                listenHistory();
                return;
            }
            gameId = gameSnap.val();
            await loadGameNumber();
            listenGame();
            listenHistory();
        }

        async function loadGameNumber() {
            const snap = await get(ref(db, "games/" + gameId + "/gameNumber"));
            if (snap.exists()) gameNumber = snap.val();
        }

        function listenGame() {
            if (unsubscribeGame) unsubscribeGame();
            unsubscribeGame = onValue(ref(db, "games/" + gameId), snap => {
                if (!snap.exists()) return;
                const g = snap.val();
                if (!gameNumber && g.gameNumber) gameNumber = g.gameNumber;
                Object.assign(state, {
                    scores: g.scores || [...START],
                    rows: g.rows ? Object.values(g.rows) : [],
                    round: g.round || 0,
                    finished: g.finished || false,
                    finalRanking: g.finalRanking || null
                });
                render();
            });
        }

        function listenHistory() {
            if (unsubscribeHistory) unsubscribeHistory();
            unsubscribeHistory = onValue(ref(db, "history"), snap => {
                if (!snap.exists()) { historyListEl.innerHTML = ""; return; }
                historyListEl.innerHTML = Object.values(snap.val())
                    .sort((a, b) => b.ts - a.ts)
                    .map(e => `<div>${e.text}</div>`)
                    .join("");
            });
        }

        function render() {
            if (!gameId) {
                scoreTableEl.innerHTML = "";
                newGameBtn.disabled = false;
                undoBtn.disabled = true;
                return;
            }
            renderScoreTable(state);
            if (state.finished && !lastFinished) {
                lastFinished = true;
                updateScores();
            }
            if (!state.finished) lastFinished = false;
            newGameBtn.disabled = !!(gameId && !state.finished);
            undoBtn.disabled = !gameId || state.rows.length === 0;
        }

        async function updateScores() {
            let alreadyUpdated = false;
            await runTransaction(ref(db, "games/" + gameId + "/scoresUpdated"), current => {
                if (current === true) { alreadyUpdated = true; return current; }
                return true;
            });
            if (alreadyUpdated) return;
            const ranking = state.finalRanking || [...state.scores]
                .map((s, i) => ({ i, s }))
                .sort((a, b) => b.s - a.s)
                .map(r => r.i);
            const [first, second] = ranking;
            const sessionKeySnap = await get(ref(db, "currentSessionKey"));
            const activeSession = sessionKeySnap.exists() && sessionKeySnap.val() ? sessionKeySnap.val() : null;
            const resultText = ranking.map(pi => `${PLAYERS[pi].slice(0, 3).toUpperCase()}(${state.scores[pi]})`).join(", ");
            await log(`${gameNumber ?? "?"}. oyun bitti: ${resultText}`);
            await runTransaction(ref(db, "sessions/" + activeSession + "/scores"), d => {
                if (!d) d = Object.fromEntries(PLAYERS.map(p => [p, 0]));
                d[PLAYERS[first]] += 3;
                d[PLAYERS[second]] += 1;
                return d;
            });
            await runTransaction(ref(db, "league"), league => {
                if (!league) league = Object.fromEntries(PLAYERS.map(p => [p, 0]));
                league[PLAYERS[first]] += 3;
                league[PLAYERS[second]] += 1;
                return league;
            });
        }

        window.selectPlayer = function (el, index) {
            if (!gameId || state.finished) return;
            state.activePlayer = index;
            document.querySelectorAll('[name="playerName"]').forEach(e => e.style.color = "");
            el.style.color = "yellow";
            actionsPanelEl.style.display = "flex";
        };

        window.toggleDouble = function () {
            state.doubleMode = !state.doubleMode;
            const x = state.doubleMode;
            doubleButtonEl.innerText  = x ? "Renk ❌2"  : "Renk ✖️1";
            penaltyButtonEl.innerText = x ? "Ceza ➖4"  : "Ceza ➖2";
            normalButtonEl.innerText  = x ? "Bitti ✔️4" : "Bitti ✔️2";
            okeyButtonEl.innerText    = x ? "Okey ⭕️8"  : "Okey ⭕️4";
        };

        window.applyScore = async function (rawValue) {
            const double = state.doubleMode && rawValue !== 1;
            const value = double ? rawValue * 2 : rawValue;
            const player = PLAYERS[state.activePlayer];
            const renk = double ? " renge" : "";

            let actualRound = state.round;
            let logText;

            await runTransaction(ref(db, "games/" + gameId), g => {
                if (!g || g.finished) return g;
                const p = state.activePlayer;
                if (p === null) return g;
                if (value < 0) {
                    g.scores[p] += value;
                } else {
                    for (let i = 0; i < 4; i++) if (i !== p) g.scores[i] -= value;
                }
                if (rawValue !== 1) g.round++;
                actualRound = g.round;
                g.rows = g.rows || {};
                g.rows[Object.keys(g.rows).length] = { round: g.round, scores: [...g.scores], player: p, value };
                const losers = g.scores.filter(s => s <= 0).length;
                if (losers >= 2 && !g.finished) {
                    g.finished = true;
                    g.finalRanking = [...g.scores].map((s, i) => ({ i, s })).sort((a, b) => b.s - a.s).map(r => r.i);
                }
                return g;
            });

            const roundLabel = rawValue === 1 ? state.round : actualRound;
            if (rawValue === 1)      logText = `${roundLabel}. elde ${player} gösterge gösterdi`;
            else if (rawValue < 0)   logText = `${roundLabel}. elde ${player}${renk} ceza aldı`;
            else if (rawValue === 2) logText = `${roundLabel}. elde ${player}${renk} bitti`;
            else if (rawValue === 4) logText = `${roundLabel}. elde ${player}${renk} bastı`;

            await log(logText);
            closeActionsPanel();
        };

        async function log(text) {
            const now = new Date();
            const time = now.toLocaleString("tr-TR", {
                day: "2-digit", month: "2-digit", year: "2-digit",
                hour: "2-digit", minute: "2-digit"
            }).replace(",", "");
            await push(ref(db, "history"), { text, time, ts: now.getTime() });
        }

        window.closeActionsPanel = function () {
            document.getElementsByName("playerName").forEach(e => e.style.color = "");
            state.activePlayer = null;
            state.doubleMode = false;
            doubleButtonEl.innerText  = "Renk ✖️1";
            penaltyButtonEl.innerText = "Ceza ➖2";
            normalButtonEl.innerText  = "Bitti ✔️2";
            okeyButtonEl.innerText    = "Okey ⭕️4";
            actionsPanelEl.style.display = "none";
        };

        window.openMenu = async () => {
            renderGameStatus(gameNumber, state);
            await openMenuPanel();
        };

        window.createNewGame = async function () {
            if (gameId && !state.finished) return;

            let sessionKey;

            let isNewSession = false;
            let sessionNum = 1;
            let startDate = "";

            await runTransaction(ref(db, "currentSessionKey"), current => {
                if (current) return current; // zaten açık session var, dokunma
                isNewSession = true;
                return "__pending__"; // yer tutucu, hemen ardından gerçek key set edilecek
            });

            const afterTxSnap = await get(ref(db, "currentSessionKey"));
            const afterTxVal  = afterTxSnap.val();

            if (isNewSession || afterTxVal === "__pending__") {
                const allSessionsSnap = await get(ref(db, "sessions"));
                sessionNum = allSessionsSnap.exists()
                    ? Math.max(0, ...Object.values(allSessionsSnap.val()).map(s => s.sessionNumber || 0)) + 1
                    : 1;
                const d = new Date();
                startDate = `${String(d.getDate()).padStart(2,"0")}.${String(d.getMonth()+1).padStart(2,"0")}.${d.getFullYear()}`;
                const sessionRef = push(ref(db, "sessions"));
                sessionKey = sessionRef.key;
                await set(sessionRef, {
                    sessionNumber: sessionNum, startDate, gameCount: 0,
                    scores: Object.fromEntries(PLAYERS.map(p => [p, 0]))
                });
                await set(ref(db, "currentSessionKey"), sessionKey);
                updateEndDayVisibility(true);
                await log(`${sessionNum}. oturum açıldı`);
            } else {
                sessionKey = afterTxVal;
            }

            const countSnap = await get(ref(db, "sessions/" + sessionKey + "/gameCount"));
            const count = countSnap.exists() ? countSnap.val() + 1 : 1;
            await set(ref(db, "sessions/" + sessionKey + "/gameCount"), count);
            gameNumber = count;
            const newRef = push(ref(db, "games"));
            await set(newRef, { scores: [...START], round: 0, finished: false, rows: {}, gameNumber: count, sessionKey });
            await set(ref(db, "currentGameId"), newRef.key);
            gameId = newRef.key;
            Object.assign(state, { scores: [...START], rows: [], round: 0, finished: false, finalRanking: null });
            lastFinished = false;
            await log(`${count}. oyun başladı`);
            listenGame();
            render();
            menuPanelEl.style.display = "none";
        };

        window.endDay = async function () {

            if (gameId && !state.finished) {
                if (!confirm("Devam eden bir oyun var! Yine de oturumu bitirmek istiyor musun?")) return;
            } else {
                if (!confirm("Oturumu bitirmek istediğinden emin misin?")) return;
            }

            const currentSessionSnap = await get(ref(db, "currentSessionKey"));
            if (!currentSessionSnap.exists() || !currentSessionSnap.val()) {
                alert("Açık bir oturum yok!");
                return;
            }
            const sessionKey = currentSessionSnap.val();
            const scoresSnap = await get(ref(db, "sessions/" + sessionKey + "/scores"));
            const scores = scoresSnap.exists() ? scoresSnap.val() : {};
            const sorted = Object.entries(scores)
                .filter(([name]) => PLAYERS.includes(name))
                .sort((a, b) => b[1] - a[1]);
            const sessionNumSnap = await get(ref(db, "sessions/" + sessionKey + "/sessionNumber"));
            const sessionNum = sessionNumSnap.exists() ? sessionNumSnap.val() : "?";
            const summary = sorted.length
                ? sorted.map(([n, p]) => `${n.slice(0, 3).toUpperCase()}(${p})`).join(", ")
                : "oyun yok";
            await log(`${sessionNum}. oturum bitti: ${summary}`);
            await set(ref(db, "currentSessionKey"), null);
            await set(ref(db, "currentGameId"), null);
            gameId = null;
            if (unsubscribeGame) { unsubscribeGame(); unsubscribeGame = null; }
            Object.assign(state, { scores: [...START], rows: [], round: 0, finished: false, finalRanking: null });
            lastFinished = false;
            updateEndDayVisibility(false);
            render();
            menuPanelEl.style.display = "none";
        };

        window.undo = async function () {
            if (state.rows.length === 0) return;
            const wasFinished = state.finished;
            const prevRanking = state.finalRanking;
            await runTransaction(ref(db, "games/" + gameId), g => {
                if (!g || !g.rows) return g;
                const keys = Object.keys(g.rows).map(Number).sort((a, b) => a - b);
                if (keys.length === 0) return g;
                delete g.rows[keys[keys.length - 1]];
                g.scores = [...START];
                Object.values(g.rows).forEach(r => {
                    if (r.value < 0) {
                        g.scores[r.player] += r.value;
                    } else {
                        for (let i = 0; i < 4; i++) if (i !== r.player) g.scores[i] -= r.value;
                    }
                });
                const remaining = Object.values(g.rows);
                g.round = remaining.length > 0 ? remaining[remaining.length - 1].round : 0;
                g.finished = false;
                g.finalRanking = null;
                g.scoresUpdated = false;
                return g;
            });

            lastFinished = false;

            if (wasFinished && prevRanking) {
                const sessionKeySnap = await get(ref(db, "currentSessionKey"));
                const activeSession = sessionKeySnap.exists() && sessionKeySnap.val() ? sessionKeySnap.val() : null;
                if (activeSession) {
                    await runTransaction(ref(db, "sessions/" + activeSession + "/scores"), d => {
                        if (!d) return d;
                        d[PLAYERS[prevRanking[0]]] -= 3;
                        d[PLAYERS[prevRanking[1]]] -= 1;
                        return d;
                    });
                    await runTransaction(ref(db, "league"), league => {
                        if (!league) return league;
                        league[PLAYERS[prevRanking[0]]] -= 3;
                        league[PLAYERS[prevRanking[1]]] -= 1;
                        return league;
                    });
                }
            }
            await log(`${gameNumber ?? "?"}. oyun — son hamle geri alındı`);
            menuPanelEl.style.display = "none";
        };
    </script>
</body>
</html>
